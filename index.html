<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>IUI Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#D4A5A5',
            'primary-light': '#F8EFEF',
            bg: '#FDFBFB',
            card: '#FFFFFF',
            main: '#333333',
            sub: '#8E8E93',
            border: '#E5E5EA'
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Hiragino Sans"', 'sans-serif'],
            serif: ['serif']
          }
        }
      }
    }
  </script>
  
  <style>
    /* 最小限のカスタムCSS (スクロールバー非表示、タップハイライト無効化など) */
    html, body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; background-color: #FDFBFB; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* ボトムシートのアニメーション */
    .bottom-sheet { transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
    .bottom-sheet.open { transform: translateY(0); }
    .bottom-sheet.closed { transform: translateY(100%); }
    
    /* フェードアニメーション */
    .fade-in { animation: fadeIn 0.2s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="text-main font-sans antialiased pb-[90px]">

  <!-- グローバルローディング (初回のみ) -->
  <div id="global-loading" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center fade-in">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-primary-light border-t-primary mb-4"></div>
    <div class="text-primary font-bold text-sm tracking-widest">LOADING...</div>
  </div>

  <!-- トースト通知 (非同期保存の結果表示など) -->
  <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-medium z-[110] transition-opacity duration-300 opacity-0 pointer-events-none shadow-lg"></div>

  <!-- === メインビューコンテナ === -->
  <main id="app-content" class="w-full min-h-screen px-4 pt-safe-top pb-safe-bottom hidden fade-in">
    <!-- 各画面はJavaScriptで動的にここにレンダリングされます -->
  </main>

  <!-- === ボトムシート (各種入力フォーム) === -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/30 z-40 hidden transition-opacity opacity-0" onclick="App.closeModal()"></div>
  <div id="modal-sheet" class="bottom-sheet closed fixed inset-x-0 bottom-0 z-50 bg-bg rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] max-h-[90vh] overflow-y-auto no-scrollbar pb-safe-bottom flex flex-col">
    <div class="sticky top-0 bg-bg/95 backdrop-blur z-10 px-6 py-4 flex justify-between items-center border-b border-border/50">
      <h3 id="modal-title" class="text-lg font-bold">タイトル</h3>
      <button onclick="App.closeModal()" class="text-sub p-2 -mr-2 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center font-bold">✕</button>
    </div>
    <div id="modal-body" class="p-6">
      <!-- フォームの中身が動的に入る -->
    </div>
  </div>

  <!-- === ボトムナビゲーション === -->
  <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-border z-30 pb-safe-bottom">
    <div class="flex justify-around items-center h-[70px] px-2" id="nav-container">
      <button onclick="App.navigate('home')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="home">
        <span class="text-2xl mb-0.5">🏠</span>ホーム
      </button>
      <button onclick="App.navigate('calendar')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="calendar">
        <span class="text-2xl mb-0.5">📅</span>カレンダー
      </button>
      <button onclick="App.navigate('records')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="records">
        <span class="text-2xl mb-0.5">✏️</span>記録
      </button>
      <button onclick="App.navigate('cycles')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="cycles">
        <span class="text-2xl mb-0.5">🔄</span>周期
      </button>
      <button onclick="App.navigate('settings')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="settings">
        <span class="text-2xl mb-0.5">⚙️</span>設定
      </button>
    </div>
  </nav>

  <script>
    // --- 1. Constants & Utilities ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbxHyWLD6EKwNQUHuBfvy0M7Cf636iFou4E6ndgtb0sfc8lKfAGPvmRUoPKMRbb1A_5WxA/exec';
    
    const Utils = {
      toLocalYYYYMMDD: (dateInput) => {
        if (!dateInput) return '';
        const d = new Date(dateInput);
        if (isNaN(d)) return '';
        return new Intl.DateTimeFormat('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'Asia/Tokyo' }).format(d).replace(/\//g, '-');
      },
      getTodayStr: () => Utils.toLocalYYYYMMDD(new Date()),
      addDays: (dateStr, days) => {
        const d = new Date(dateStr);
        if (isNaN(d)) return null;
        d.setDate(d.getDate() + days);
        return d;
      },
      formatMMDD: (d) => {
        if (!d || isNaN(d)) return '-';
        return `${d.getMonth() + 1}/${d.getDate()}`;
      },
      generateId: () => 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36),
      showToast: (msg, isError = false) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = `fixed top-safe-top mt-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm font-medium z-[110] transition-opacity duration-300 shadow-lg ${isError ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'} opacity-100`;
        setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
      }
    };

    // --- 2. State Management (Store) ---
    const Store = {
      state: {
        currentView: 'home',
        cycles: [],
        daily: [],
        clinic: [],
        iui: [],
        activeCycle: null,
        calMonth: new Date(),
        settings: { cycleLen: 31, abstainDays: 2 }
      },
      set(updates) {
        this.state = { ...this.state, ...updates };
        App.render(); // 状態が変わるたびにUIを再描画
      },
      get() { return this.state; }
    };

    // --- 3. API Communication ---
    const API = {
      async fetchAll() {
        try {
          const fetchTable = async (t) => (await fetch(`${API_URL}?table=${t}`)).json();
          const [cycles, daily, clinic, iui] = await Promise.all([
            fetchTable('cycles'), fetchTable('daily_records'), fetchTable('clinic_visits'), fetchTable('iui_events')
          ]);
          
          // 周期を開始日順でソート（過去日の登録に対応）
          cycles.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
          
          let activeCycle = null;
          let filteredDaily = [], filteredClinic = [], filteredIUI = [];
          
          if (cycles.length > 0) {
            activeCycle = cycles[cycles.length - 1]; // 開始日が最新のものをアクティブとする
            filteredDaily = daily.filter(d => d.cycle_id === activeCycle.id);
            filteredClinic = clinic.filter(c => c.cycle_id === activeCycle.id);
            filteredIUI = iui.filter(i => i.cycle_id === activeCycle.id);
          }
          
          Store.set({ cycles, daily: filteredDaily, clinic: filteredClinic, iui: filteredIUI, activeCycle });
        } catch (e) {
          Utils.showToast('データ同期に失敗しました', true);
          console.error(e);
        }
      },
      // Optimistic UI アプローチ: UIを即座に更新し、裏でAPIを叩く
      async save(table, payloadData) {
        const { activeCycle } = Store.get();
        if (table !== 'cycles' && !activeCycle) {
          Utils.showToast('周期が存在しません', true);
          return false;
        }

        const isUpdate = !!payloadData.id;
        const recordId = payloadData.id || Utils.generateId();
        
        const payload = { 
          action: isUpdate ? 'update' : 'insert',
          id: recordId,
          table: table,
          cycle_id: table === 'cycles' ? undefined : activeCycle.id,
          ...payloadData
        };

        // UI先行更新用データの構築
        const localData = { ...payload };
        if(table === 'daily_records' && !localData.lh_result) localData.lh_result = '';
        
        const s = Store.get();
        let targetArrayKey = table === 'daily_records' ? 'daily' : table === 'clinic_visits' ? 'clinic' : table === 'iui_events' ? 'iui' : 'cycles';
        let newArray = [...s[targetArrayKey]];
        
        if (isUpdate) {
          const idx = newArray.findIndex(item => item.id === recordId);
          if(idx !== -1) newArray[idx] = localData;
        } else {
          newArray.push(localData);
        }
        
        // 周期データの場合は開始日順にソート
        if (table === 'cycles') {
          newArray.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        }
        
        // 即座にStateを更新し、モーダルを閉じる
        Store.set({ [targetArrayKey]: newArray });
        if(table === 'cycles') Store.set({ activeCycle: newArray[newArray.length - 1] });
        
        App.closeModal();
        Utils.showToast('保存しました');

        // バックグラウンドでAPI送信
        try {
          fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => { if(res.status !== 'success') throw new Error(); })
            .catch(() => Utils.showToast('クラウドへの保存に失敗しました', true));
        } catch(e) {}
        
        return true;
      }
    };

    // --- 4. UI Rendering (Views) ---
    const Views = {
      home: () => {
        const { activeCycle, daily, clinic, iui, settings } = Store.get();
        
        const headerHtml = `
          <div class="flex justify-between items-center mb-6 mt-4">
            <div>
              <div class="text-xs text-sub mb-1 font-medium">${Utils.toLocalYYYYMMDD(new Date()).replace(/-/g, '/')}</div>
              <h1 class="text-2xl font-serif tracking-wider text-main">IUIスケジュール</h1>
            </div>
            <div class="text-3xl bg-primary-light w-10 h-10 rounded-full flex items-center justify-center">🌸</div>
          </div>
        `;

        if (!activeCycle) {
          return headerHtml + `
            <div class="bg-card rounded-[20px] p-6 shadow-sm border border-border/30 text-center">
              <p class="text-sub mb-4">現在アクティブな周期がありません</p>
              <button onclick="App.openModal('new-cycle')" class="bg-primary text-white w-full py-3 rounded-xl font-bold">新しい周期を登録</button>
            </div>
          `;
        }

        const today = Utils.getTodayStr();
        const startD = activeCycle.start_date;
        const diffDays = Math.floor((new Date(today) - new Date(startD)) / 86400000) + 1;
        
        const latestIUI = iui[iui.length - 1];
        const iuiDate = latestIUI?.planned_date ? new Date(latestIUI.planned_date) : null;
        const abstainDate = iuiDate ? Utils.addDays(iuiDate, -settings.abstainDays) : null;
        const periodDate = Utils.addDays(startD, settings.cycleLen);

        const hasTodayDaily = daily.some(d => Utils.toLocalYYYYMMDD(d.date) === today && d.temperature);
        const taskHtml = hasTodayDaily 
          ? `<div class="flex items-center text-[15px]"><span class="mr-3 text-lg">✅</span><span class="text-sub">今日の記録は完了しています</span></div>`
          : `<div class="flex items-center text-[15px]"><div class="w-2 h-2 rounded-full bg-primary mr-3"></div><span class="font-medium">基礎体温を記録しましょう</span></div>`;

        return headerHtml + `
          <!-- Dashboard Card -->
          <div class="bg-card rounded-[24px] p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-border/20 mb-6">
            <div class="flex justify-between items-center mb-5">
              <span class="px-3 py-1 bg-primary-light text-[#B07B7B] text-xs font-bold rounded-lg">${activeCycle.status}</span>
              <span class="text-sm text-sub font-medium">周期 ${diffDays}日目</span>
            </div>
            <div class="grid grid-cols-2 gap-y-5 gap-x-6">
              <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">IUI実施日(予定)</span><span class="text-lg font-bold">${Utils.formatMMDD(iuiDate)}</span></div>
              <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">禁欲開始日</span><span class="text-lg font-bold">${Utils.formatMMDD(abstainDate)}</span></div>
              <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">次回生理予定</span><span class="text-lg font-bold">${Utils.formatMMDD(periodDate)}</span><span class="text-[10px] text-sub mt-0.5">±3日</span></div>
            </div>
          </div>

          <!-- Tasks -->
          <h2 class="text-sm font-bold text-main mb-3 ml-1">サポートタスク</h2>
          <div class="bg-card rounded-[16px] p-4 shadow-sm border border-border/20 mb-6 cursor-pointer active:scale-[0.98] transition-transform" onclick="${!hasTodayDaily ? "App.openModal('daily')" : ""}">
            ${taskHtml}
          </div>

          <!-- Quick Actions -->
          <h2 class="text-sm font-bold text-main mb-3 ml-1">クイック記録</h2>
          <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="App.openModal('daily')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">🌡</span><span class="text-[13px] font-bold">基礎体温</span></div>
              <span class="text-gray-300">›</span>
            </button>
            <button onclick="App.openModal('clinic')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">🩺</span><span class="text-[13px] font-bold">通院記録</span></div>
              <span class="text-gray-300">›</span>
            </button>
            <button onclick="App.openModal('meds')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">💊</span><span class="text-[13px] font-bold">薬・注射</span></div>
              <span class="text-gray-300">›</span>
            </button>
            <button onclick="App.openModal('iui')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">♡</span><span class="text-[13px] font-bold">IUI管理</span></div>
              <span class="text-gray-300">›</span>
            </button>
          </div>
          
          <div class="bg-primary-light rounded-xl p-4 text-center text-[13px] text-[#8A6565] italic">
            妻のサポート、今日もお疲れ様です。
          </div>
        `;
      },

      calendar: () => {
        const { calMonth, daily, clinic } = Store.get();
        const year = calMonth.getFullYear();
        const month = calMonth.getMonth();
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();
        
        const recordDates = new Set([...daily, ...clinic].map(r => Utils.toLocalYYYYMMDD(r.date || r.visit_date)));
        const todayStr = Utils.getTodayStr();

        let cells = '';
        for (let i = 0; i < firstDay; i++) cells += `<div></div>`;
        for (let i = 1; i <= lastDay; i++) {
          const dStr = Utils.toLocalYYYYMMDD(new Date(year, month, i));
          const isToday = dStr === todayStr;
          const hasRec = recordDates.has(dStr);
          
          cells += `
            <div class="aspect-square flex flex-col items-center justify-center rounded-full relative cursor-pointer active:bg-gray-100 transition-colors ${isToday ? 'border border-primary font-bold' : ''}" 
                 onclick="App.selectDate('${dStr}')" id="cal-cell-${dStr}">
              <span class="text-[15px]">${i}</span>
              ${hasRec ? `<div class="w-1 h-1 bg-primary rounded-full absolute bottom-1"></div>` : ''}
            </div>
          `;
        }

        return `
          <div class="mt-4 mb-6">
            <h1 class="text-2xl font-serif tracking-wider text-main text-center">カレンダー</h1>
          </div>
          <div class="bg-card rounded-[24px] p-5 shadow-sm border border-border/20">
            <div class="flex justify-between items-center mb-4 px-2">
              <button onclick="App.changeMonth(-1)" class="p-2 text-xl text-sub hover:text-main transition-colors">‹</button>
              <div class="font-bold text-lg">${year}年${month + 1}月</div>
              <button onclick="App.changeMonth(1)" class="p-2 text-xl text-sub hover:text-main transition-colors">›</button>
            </div>
            <div class="grid grid-cols-7 text-center mb-2 text-xs font-bold text-sub">
              <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
            </div>
            <div class="grid grid-cols-7 text-center gap-1">
              ${cells}
            </div>
          </div>
          <div id="cal-detail-area" class="mt-6">
            <p class="text-center text-sub text-sm mt-10">日付をタップして記録を確認</p>
          </div>
        `;
      },

      records: () => {
        const { daily, clinic } = Store.get();
        const all = [...daily.map(d => ({...d, type: 'daily'})), ...clinic.map(c => ({...c, type: 'clinic', date: c.visit_date}))];
        all.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        let listHtml = all.map(r => `
          <div class="bg-card rounded-[16px] p-4 mb-3 shadow-sm border border-border/20 flex justify-between items-center active:bg-gray-50 transition-colors cursor-pointer"
               onclick="App.openModal('${r.type}', '${r.id}')">
            <div>
              <div class="font-bold text-[15px] mb-1">${Utils.toLocalYYYYMMDD(r.date)}</div>
              <div class="text-[13px] text-sub">
                ${r.type === 'daily' ? `🌡 体温: <span class="font-medium text-main">${r.temperature || '-'}</span>°C` : '🏥 通院記録あり'}
              </div>
            </div>
            <div class="text-gray-300 text-xl">›</div>
          </div>
        `).join('');
        
        if(!listHtml) listHtml = '<p class="text-center text-sub mt-10 text-sm">記録がありません</p>';

        return `
          <div class="mt-4 mb-6"><h1 class="text-2xl font-serif tracking-wider">記録一覧</h1></div>
          <div class="pb-4">${listHtml}</div>
        `;
      },

      cycles: () => {
        const { cycles } = Store.get();
        let listHtml = cycles.slice().reverse().map(c => {
          const sD = new Date(c.start_date);
          return `
            <div class="bg-card rounded-[16px] p-4 mb-3 shadow-sm border border-border/20 flex justify-between items-center active:bg-gray-50 transition-colors cursor-pointer"
                 onclick="App.openModal('new-cycle', '${c.id}')">
              <div>
                <div class="flex gap-2 items-center mb-1">
                  <span class="px-2 py-0.5 bg-gray-100 rounded text-[10px] text-sub font-bold">${c.status}</span>
                  <span class="text-[11px] text-sub">${c.type || '未設定'}</span>
                </div>
                <div class="font-bold text-[16px]">${Utils.toLocalYYYYMMDD(sD)} 〜</div>
              </div>
              <div class="text-gray-300 text-xl">›</div>
            </div>
          `;
        }).join('');
        
        if(!listHtml) listHtml = '<p class="text-center text-sub mt-10 text-sm">周期データがありません</p>';

        return `
          <div class="mt-4 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-serif tracking-wider">周期一覧</h1>
            <button onclick="App.openModal('new-cycle')" class="bg-primary text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-sm">＋ 新規</button>
          </div>
          <div>${listHtml}</div>
        `;
      },

      settings: () => {
        const { settings } = Store.get();
        return `
          <div class="mt-4 mb-6"><h1 class="text-2xl font-serif tracking-wider">設定</h1></div>
          
          <h2 class="text-sm font-bold text-main mb-3 ml-1">周期設定</h2>
          <div class="bg-card rounded-[20px] p-5 shadow-sm border border-border/20 mb-6">
            <div class="mb-4">
              <label class="block text-[13px] text-main mb-2">平均周期日数</label>
              <select id="set-cycle-len" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[15px] outline-none" onchange="App.updateSettings('cycleLen', this.value)">
                <option value="28" ${settings.cycleLen==28?'selected':''}>28日</option>
                <option value="31" ${settings.cycleLen==31?'selected':''}>31日</option>
                <option value="35" ${settings.cycleLen==35?'selected':''}>35日</option>
              </select>
            </div>
            <div>
              <label class="block text-[13px] text-main mb-2">禁欲推奨日数</label>
              <select id="set-abstinence" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[15px] outline-none" onchange="App.updateSettings('abstainDays', this.value)">
                <option value="1" ${settings.abstainDays==1?'selected':''}>1日</option>
                <option value="2" ${settings.abstainDays==2?'selected':''}>2日</option>
                <option value="3" ${settings.abstainDays==3?'selected':''}>3日</option>
              </select>
            </div>
          </div>
          
          <div class="mt-12 text-center text-[10px] text-gray-300">
            <p>Developed for Shogo & 🐈 Hotate, Uni</p>
            <p class="mt-1">v2.1 State-driven Arch</p>
          </div>
        `;
      }
    };

    // --- 5. Modal Forms Definitions ---
    const Forms = {
      daily: (id) => {
        const r = Store.get().daily.find(x => x.id === id) || {};
        return `
          <div class="mb-4">
            <label class="block text-[13px] font-bold mb-1">日付</label>
            <input type="date" id="form-date" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px] outline-none" value="${r.date ? Utils.toLocalYYYYMMDD(r.date) : Utils.getTodayStr()}" onchange="App.checkExistingDaily(this.value)">
          </div>
          <div class="mb-6">
            <label class="block text-[13px] font-bold mb-1">基礎体温 (°C)</label>
            <input type="number" id="form-temp" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px] outline-none" step="0.01" value="${r.temperature || ''}" placeholder="例: 36.50">
          </div>
          <input type="hidden" id="form-id" value="${r.id || ''}">
          <button onclick="App.submitForm('daily')" class="w-full bg-primary text-white font-bold py-4 rounded-[16px] shadow-sm active:scale-[0.98] transition-transform">保存する</button>
        `;
      },
      clinic: (id) => {
        const r = Store.get().clinic.find(x => x.id === id) || {};
        return `
          <div class="mb-4">
            <label class="block text-[13px] font-bold mb-1">受診日</label>
            <input type="date" id="form-date" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px]" value="${r.visit_date ? Utils.toLocalYYYYMMDD(r.visit_date) : Utils.getTodayStr()}">
          </div>
          <div class="mb-6">
            <label class="block text-[13px] font-bold mb-1">次回受診の指示日</label>
            <input type="date" id="form-next" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px]" value="${r.next_visit_date ? Utils.toLocalYYYYMMDD(r.next_visit_date) : ''}">
          </div>
          <input type="hidden" id="form-id" value="${r.id || ''}">
          <button onclick="App.submitForm('clinic')" class="w-full bg-primary text-white font-bold py-4 rounded-[16px] shadow-sm active:scale-[0.98] transition-transform">保存する</button>
        `;
      },
      iui: (id) => {
        const r = Store.get().iui.find(x => x.id === id) || {};
        return `
          <div class="mb-6">
            <label class="block text-[13px] font-bold mb-1">人工授精(IUI) 予定日</label>
            <input type="date" id="form-planned" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px]" value="${r.planned_date ? Utils.toLocalYYYYMMDD(r.planned_date) : Utils.getTodayStr()}">
          </div>
          <input type="hidden" id="form-id" value="${r.id || ''}">
          <button onclick="App.submitForm('iui')" class="w-full bg-primary text-white font-bold py-4 rounded-[16px] shadow-sm active:scale-[0.98] transition-transform">保存する</button>
        `;
      },
      'new-cycle': (id) => {
        const r = Store.get().cycles.find(x => x.id === id) || {};
        return `
          <div class="mb-4">
            <label class="block text-[13px] font-bold mb-1">生理開始日</label>
            <input type="date" id="form-date" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px]" value="${r.start_date ? Utils.toLocalYYYYMMDD(r.start_date) : Utils.getTodayStr()}">
          </div>
          <div class="mb-4">
            <label class="block text-[13px] font-bold mb-1">周期タイプ</label>
            <select id="form-type" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px] outline-none">
              <option value="人工授精周期" ${r.type==='人工授精周期'?'selected':''}>人工授精周期</option>
              <option value="排卵誘発周期" ${r.type==='排卵誘発周期'?'selected':''}>排卵誘発周期</option>
              <option value="自然周期" ${r.type==='自然周期'?'selected':''}>自然周期</option>
            </select>
          </div>
          <div class="mb-6">
            <label class="block text-[13px] font-bold mb-1">ステータス</label>
            <select id="form-status" class="w-full bg-gray-50 border border-border rounded-xl px-4 py-3 text-[16px] outline-none">
              <option value="進行中" ${r.status==='進行中'?'selected':''}>進行中</option>
              <option value="周期終了" ${r.status==='周期終了'?'selected':''}>周期終了</option>
            </select>
          </div>
          <input type="hidden" id="form-id" value="${r.id || ''}">
          <button onclick="App.submitForm('cycles')" class="w-full bg-primary text-white font-bold py-4 rounded-[16px] shadow-sm active:scale-[0.98] transition-transform">周期を保存</button>
        `;
      },
      meds: () => `<div class="text-center text-sub py-10 font-bold">機能準備中</div>`
    };

    const FormTitles = { daily: '日次記録', clinic: '通院記録', iui: 'IUI予定', 'new-cycle': '周期の登録・編集', meds: '薬・注射' };

    // --- 6. Main Application Logic ---
    const App = {
      async init() {
        document.getElementById('global-loading').classList.remove('hidden');
        await API.fetchAll();
        
        // Auto-select today in calendar on load
        setTimeout(() => {
          if(Store.get().currentView === 'home') this.render();
          document.getElementById('global-loading').classList.add('hidden');
        }, 300);
      },

      render() {
        const { currentView } = Store.get();
        const content = document.getElementById('app-content');
        
        // Render current view
        content.innerHTML = Views[currentView] ? Views[currentView]() : '';
        content.classList.remove('hidden');

        // Update nav UI
        document.querySelectorAll('.nav-btn').forEach(btn => {
          if(btn.dataset.target === currentView) {
            btn.classList.add('text-primary');
            btn.classList.remove('text-sub');
          } else {
            btn.classList.remove('text-primary');
            btn.classList.add('text-sub');
          }
        });
      },

      navigate(view) {
        Store.set({ currentView: view });
        window.scrollTo(0,0);
      },

      // Modal Logic
      openModal(type, id = null) {
        document.getElementById('modal-title').innerText = FormTitles[type];
        document.getElementById('modal-body').innerHTML = Forms[type](id);
        
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        
        overlay.classList.remove('hidden');
        // trigger reflow
        void overlay.offsetWidth;
        overlay.classList.remove('opacity-0');
        overlay.classList.add('opacity-100');
        
        sheet.classList.remove('closed');
        sheet.classList.add('open');
      },

      closeModal() {
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        
        sheet.classList.remove('open');
        sheet.classList.add('closed');
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0');
        
        setTimeout(() => { overlay.classList.add('hidden'); }, 300);
      },

      // Form Handling
      checkExistingDaily(dateStr) {
        const r = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === dateStr);
        document.getElementById('form-id').value = r ? r.id : '';
        document.getElementById('form-temp').value = r ? (r.temperature || '') : '';
      },

      submitForm(table) {
        const id = document.getElementById('form-id')?.value;
        const payload = { id };

        if (table === 'daily') {
          payload.date = document.getElementById('form-date').value;
          payload.temperature = document.getElementById('form-temp').value;
        } else if (table === 'clinic') {
          payload.visit_date = document.getElementById('form-date').value;
          payload.next_visit_date = document.getElementById('form-next').value;
        } else if (table === 'iui') {
          payload.planned_date = document.getElementById('form-planned').value;
        } else if (table === 'cycles') {
          payload.start_date = document.getElementById('form-date').value;
          payload.type = document.getElementById('form-type').value;
          payload.status = document.getElementById('form-status').value;
        }

        API.save(table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles', payload);
      },

      // Feature specific logic
      changeMonth(delta) {
        const d = Store.get().calMonth;
        d.setMonth(d.getMonth() + delta);
        Store.set({ calMonth: d });
      },

      selectDate(dStr) {
        // UI Selection visual update without full re-render
        document.querySelectorAll('[id^="cal-cell-"]').forEach(el => {
          el.classList.remove('bg-primary', 'text-white');
          const dot = el.querySelector('.bg-white');
          if(dot) dot.classList.replace('bg-white', 'bg-primary');
        });
        
        const targetEl = document.getElementById(`cal-cell-${dStr}`);
        if(targetEl) {
          targetEl.classList.add('bg-primary', 'text-white');
          const dot = targetEl.querySelector('.bg-primary');
          if(dot && targetEl.classList.contains('bg-primary')) dot.classList.replace('bg-primary', 'bg-white');
        }

        // Build detail content
        const { daily, clinic } = Store.get();
        const dRec = daily.find(r => Utils.toLocalYYYYMMDD(r.date) === dStr);
        const cRec = clinic.find(r => Utils.toLocalYYYYMMDD(r.visit_date) === dStr);
        
        let content = '';
        if(dRec) content += `<div class="mb-1">🌡 体温: <span class="font-bold">${dRec.temperature || '-'}</span> °C</div>`;
        if(cRec) content += `<div>🏥 受診記録あり</div>`;
        
        const actionHtml = `<button class="w-full mt-4 py-3 rounded-xl border border-primary text-primary font-bold text-sm" onclick="App.openModal('daily', '${dRec?dRec.id:''}')">日次記録を入力・編集</button>`;

        document.getElementById('cal-detail-area').innerHTML = `
          <div class="text-sm font-bold text-sub mb-3">${dStr.replace(/-/g, '/')}</div>
          ${content ? `<div class="bg-card p-4 rounded-[16px] shadow-sm border border-border/20">${content}${actionHtml}</div>` : `<div class="text-sub text-sm">記録なし${actionHtml}</div>`}
        `;
        
        // Modal連携のため一時的に選択日をセット
        setTimeout(() => {
          const dateInput = document.getElementById('form-date');
          if(dateInput && !document.getElementById('modal-sheet').classList.contains('open')) {
            dateInput.value = dStr;
          }
        }, 10);
      },

      updateSettings(key, val) {
        const s = Store.get().settings;
        s[key] = parseInt(val, 10);
        Store.set({ settings: s });
      }
    };

    // --- 7. Boot ---
    window.onload = () => App.init();
  </script>
</body>
</html>
