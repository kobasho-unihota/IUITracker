<body class="text-main font-sans antialiased overflow-x-hidden">

  <div id="global-loading" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center fade-in">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-primary-light border-t-primary mb-4"></div>
    <div class="text-primary font-bold text-sm tracking-widest">LOADING...</div>
  </div>

  <div id="toast" class="fixed padding-safe-toast left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-medium z-[110] transition-opacity duration-300 opacity-0 pointer-events-none shadow-lg whitespace-nowrap"></div>

  <main id="app-content" class="w-full min-h-screen px-4 pt-4 padding-safe-nav hidden fade-in"></main>

  <div id="modal-overlay" class="fixed inset-0 bg-black/30 z-40 hidden transition-opacity opacity-0" onclick="App.closeModal()"></div>
  <div id="modal-sheet" class="bottom-sheet closed fixed inset-x-0 bottom-0 z-50 bg-bg rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] max-h-[85vh] flex flex-col max-w-full overflow-x-hidden box-border">
    <div class="sticky top-0 bg-bg/95 backdrop-blur z-10 px-6 py-4 flex justify-between items-center border-b border-border/50 shrink-0">
      <h3 id="modal-title" class="text-lg font-bold">タイトル</h3>
      <button onclick="App.closeModal()" class="text-sub p-2 -mr-2 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center font-bold">✕</button>
    </div>
    <div id="modal-body" class="p-6 flex-1 overflow-y-auto no-scrollbar padding-safe-modal"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-border z-30" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
    <div class="flex justify-around items-center h-[70px] px-2" id="nav-container">
      <button onclick="App.navigate('home')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="home"><span class="text-2xl mb-0.5">🏠</span>ホーム</button>
      <button onclick="App.navigate('calendar')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="calendar"><span class="text-2xl mb-0.5">📅</span>カレンダー</button>
      <button onclick="App.navigate('records')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="records"><span class="text-2xl mb-0.5">✏️</span>記録</button>
      <button onclick="App.navigate('cycles')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="cycles"><span class="text-2xl mb-0.5">🔄</span>周期</button>
      <button onclick="App.navigate('settings')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="settings"><span class="text-2xl mb-0.5">⚙️</span>設定</button>
    </div>
  </nav>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxHyWLD6EKwNQUHuBfvy0M7Cf636iFou4E6ndgtb0sfc8lKfAGPvmRUoPKMRbb1A_5WxA/exec';
    
    const Utils = {
      toLocalYYYYMMDD: (dateInput) => {
        if (!dateInput) return '';
        const d = new Date(dateInput);
        if (isNaN(d)) return '';
        return new Intl.DateTimeFormat('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'Asia/Tokyo' }).format(d).replace(/\//g, '-');
      },
      getTodayStr: () => Utils.toLocalYYYYMMDD(new Date()),
      addDays: (dateStr, days) => {
        const d = new Date(dateStr);
        if (isNaN(d)) return null;
        d.setDate(d.getDate() + days);
        return d;
      },
      formatMMDD: (d) => {
        if (!d || isNaN(d)) return '-';
        return `${d.getMonth() + 1}/${d.getDate()}`;
      },
      generateId: () => 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36),
      showToast: (msg, isError = false) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = `fixed padding-safe-toast left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm font-medium z-[110] transition-opacity duration-300 shadow-lg ${isError ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'} opacity-100`;
        setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
      },
      getCalendarUrl: (title, dateStr) => {
        const start = new Date(dateStr);
        const end = Utils.addDays(dateStr, 1);
        const format = (d) => {
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          return `${yyyy}${mm}${dd}`;
        };
        const dates = `${format(start)}/${format(end)}`;
        return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dates}`;
      }
    };

    const getSettings = () => {
      const defaultSettings = { cycleLen: 31, abstainDays: 2, periodDays: 5 };
      try {
        const savedSettings = JSON.parse(localStorage.getItem('iui_settings'));
        return savedSettings ? { ...defaultSettings, ...savedSettings } : defaultSettings;
      } catch (e) {
        return defaultSettings;
      }
    };

    const Store = {
      state: {
        currentView: 'home',
        dashTab: 'current',
        cycles: [],
        daily: [],
        clinic: [],
        iui: [],
        aiPrediction: JSON.parse(localStorage.getItem('iui_ai_prediction')) || null,
        apiKey: localStorage.getItem('iui_gemini_api_key') || '',
        activeCycle: null,
        selectedCycleId: null,
        calMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1),
        settings: getSettings()
      },
      set(updates) {
        this.state = { ...this.state, ...updates };
        App.render();
      },
      get() { return this.state; }
    };

    const API = {
      loadFromCache() {
        try {
          const cycles = JSON.parse(localStorage.getItem('iui_data_cycles')) || [];
          const daily = JSON.parse(localStorage.getItem('iui_data_daily')) || [];
          const clinic = JSON.parse(localStorage.getItem('iui_data_clinic')) || [];
          const iui = JSON.parse(localStorage.getItem('iui_data_iui')) || [];
          
          if (cycles.length > 0) {
            const activeCycle = cycles[cycles.length - 1];
            Store.set({ cycles, daily, clinic, iui, activeCycle });
            return true;
          }
        } catch(e) {
          console.warn('Cache load error', e);
        }
        return false;
      },

      async fetchAll() {
        try {
          const fetchTable = async (t) => (await fetch(`${API_URL}?table=${t}`)).json();
          const [cycles, daily, clinic, iui] = await Promise.all([
            fetchTable('cycles'), fetchTable('daily_records'), fetchTable('clinic_visits'), fetchTable('iui_events')
          ]);
          
          cycles.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
          const activeCycle = cycles.length > 0 ? cycles[cycles.length - 1] : null;
          
          Store.set({ cycles, daily, clinic, iui, activeCycle });

          // キャッシュを最新データで更新
          localStorage.setItem('iui_data_cycles', JSON.stringify(cycles));
          localStorage.setItem('iui_data_daily', JSON.stringify(daily));
          localStorage.setItem('iui_data_clinic', JSON.stringify(clinic));
          localStorage.setItem('iui_data_iui', JSON.stringify(iui));

          if (!localStorage.getItem('iui_settings')) {
            const stats = App.getCycleStats();
            if (stats.count > 0) {
              App.updateSettings('cycleLen', stats.avg);
            }
          }
        } catch (e) {
          console.warn('Fetch error:', e);
        }
      },
      async save(table, payloadData) {
        const { cycles } = Store.get();
        if (cycles.length === 0 && table !== 'cycles') {
          Utils.showToast('先に周期を登録してください', true);
          return false;
        }

        const isUpdate = !!payloadData.id;
        const recordId = payloadData.id || Utils.generateId();
        
        let cycleId = undefined;
        if (table !== 'cycles') {
          const targetDate = payloadData.date || payloadData.visit_date || payloadData.planned_date || Utils.getTodayStr();
          const targetCycle = App.getCycleForDate(targetDate);
          if (!targetCycle) {
            Utils.showToast('対象日付以前の周期がありません。先に周期を追加してください。', true);
            return false;
          }
          cycleId = targetCycle.id;
        }

        const payload = { 
          action: isUpdate ? 'update' : 'insert',
          id: recordId,
          table: table,
          cycle_id: cycleId,
          ...payloadData
        };

        const localData = { ...payload };
        if(table === 'daily_records' && !localData.lh_result) localData.lh_result = '';
        
        const s = Store.get();
        let targetArrayKey = table === 'daily_records' ? 'daily' : table === 'clinic_visits' ? 'clinic' : table === 'iui_events' ? 'iui' : 'cycles';
        let newArray = [...s[targetArrayKey]];
        
        if (isUpdate) {
          const idx = newArray.findIndex(item => item.id === recordId);
          if(idx !== -1) newArray[idx] = localData;
        } else {
          newArray.push(localData);
        }
        
        if (table === 'cycles') {
          newArray.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        }
        
        Store.set({ [targetArrayKey]: newArray });
        if(table === 'cycles') Store.set({ activeCycle: newArray[newArray.length - 1] });
        
        // 変更をローカルキャッシュにも即座に反映
        localStorage.setItem(`iui_data_${targetArrayKey}`, JSON.stringify(newArray));
        
        App.closeModal();
        Utils.showToast('保存しました');

        try {
          fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => { if(res.status !== 'success') throw new Error(); })
            .catch(() => Utils.showToast('クラウド保存に遅延が発生しています', true));
        } catch(e) {}
        
        return true;
      },
      
      async analyzeWithAI() {
        const { activeCycle, daily, cycles, iui, apiKey } = Store.get();
        
        if (!apiKey) {
          Utils.showToast('設定画面からGemini APIキーを登録してください', true);
          setTimeout(() => App.navigate('settings'), 1500);
          return;
        }
        
        if (!activeCycle) return Utils.showToast('アクティブな周期がありません', true);
        
        const activeStartDateStr = Utils.toLocalYYYYMMDD(activeCycle.start_date);
        
        // 日付ベースで厳密に今周期のデータを抽出
        const cycleDaily = daily
          .filter(d => {
             const dStr = Utils.toLocalYYYYMMDD(d.date);
             return d.temperature && dStr >= activeStartDateStr;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date));
          
        if (cycleDaily.length < 5) return Utils.showToast('予測にはもう少し体温データが必要です（5日分以上）', true);

        document.getElementById('global-loading').classList.remove('hidden');
        
        // --- 1. 今周期の基礎体温データ構築 ---
        const dataText = cycleDaily.map(d => `${Utils.toLocalYYYYMMDD(d.date)}: ${d.temperature}度`).join('\n');
        
        // --- 2. 過去の周期データ（実績傾向）の構築 ---
        let pastDataText = "";
        const pastCycles = cycles.filter(c => c.id !== activeCycle.id).slice(-3); // 直近3周期に限定
        
        if (pastCycles.length > 0) {
          pastDataText += "【過去の周期の実績（参考データ）】\n";
          pastCycles.forEach((c, index) => {
            const nextC = cycles.find(nc => new Date(nc.start_date) > new Date(c.start_date));
            if (nextC) {
              const startDate = new Date(c.start_date);
              const nextStartDate = new Date(nextC.start_date);
              const cycleLength = Math.round((nextStartDate - startDate) / 86400000);
              
              pastDataText += `[過去周期 ${index + 1}]\n`;
              pastDataText += `- 周期開始日(生理日): ${Utils.toLocalYYYYMMDD(startDate)}\n`;
              pastDataText += `- 周期日数: ${cycleLength}日 (次生理日: ${Utils.toLocalYYYYMMDD(nextStartDate)})\n`;
              
              // IUI実施日を含める (日付ベースで判定)
              const cIui = iui.filter(x => {
                 const evDate = Utils.toLocalYYYYMMDD(x.actual_date || x.planned_date);
                 return evDate >= Utils.toLocalYYYYMMDD(startDate) && evDate < Utils.toLocalYYYYMMDD(nextStartDate);
              }).pop();
              
              if (cIui && (cIui.actual_date || cIui.planned_date)) {
                 const iuiDate = new Date(cIui.actual_date || cIui.planned_date);
                 pastDataText += `- IUI実施(予定)日: ${Utils.toLocalYYYYMMDD(iuiDate)}\n`;
              }
              
              const pDaily = daily
                .filter(d => {
                   const dStr = Utils.toLocalYYYYMMDD(d.date);
                   return d.temperature && dStr >= Utils.toLocalYYYYMMDD(startDate) && dStr < Utils.toLocalYYYYMMDD(nextStartDate);
                })
                .sort((a, b) => new Date(a.date) - new Date(b.date));
              
              if (pDaily.length > 0) {
                 const pDataText = pDaily.map(d => `${Utils.formatMMDD(new Date(d.date))}:${d.temperature}`).join(', ');
                 pastDataText += `- 基礎体温データ: ${pDataText}\n`;
              }
              pastDataText += "\n";
            }
          });
          if (pastDataText === "【過去の周期の実績（参考データ）】\n") {
             pastDataText = "※過去の周期完了データ（次の生理が来た記録）はまだありません。\n";
          }
        } else {
          pastDataText = "※過去の周期完了データはまだありません。\n";
        }

        // 今周期のIUI予定/実績を含める (日付ベースで判定)
        const currentIUI = iui.filter(x => {
           const evDate = Utils.toLocalYYYYMMDD(x.actual_date || x.planned_date);
           return evDate >= activeStartDateStr;
        }).pop();
        let currentIUIText = "";
        if(currentIUI && (currentIUI.actual_date || currentIUI.planned_date)) {
          currentIUIText = `\n【今周期のIUI実施(予定)日】\n${Utils.toLocalYYYYMMDD(currentIUI.actual_date || currentIUI.planned_date)}\n`;
        }

        // --- 3. プロンプト作成 ---
        const prompt = `あなたは不妊治療をサポートするAIアシスタントです。以下の今周期のデータ（基礎体温、IUI実施日）と、過去の周期の実績（IUI実施日、基礎体温推移、次生理日）を総合的に分析し、以下の2点を予測してください。

1. 今周期の「低温相から高温相へ移行したタイミング（推測・排卵日）」
2. 「推測・排卵日 または IUI実施日 から推測される次回の生理予定日」
※生理予定日の予測には、一般的な14日固定ではなく、必ず【過去の周期の実績】から「IUI実施日（または排卵日）から次の生理日までの実際の日数（黄体期の長さ）」の平均や傾向を算出し、それを最優先で加算してください。過去データがない場合のみ14日として計算してください。

【今周期の基礎体温データ】
${dataText}
${currentIUIText}

${pastDataText}

結果は必ず以下のキーを持つJSON形式で返してください。Markdownの装飾などは含めず、純粋なJSON文字列のみを出力してください。
{
  "ovulation_date": "YYYY-MM-DD",
  "next_period_date": "YYYY-MM-DD",
  "reason": "推測の理由やアドバイス（2〜3文）。医師のような専門的かつ丁寧で落ち着いた口調で記述してください。次回の生理予定日の算出根拠（過去のIUI実施日からの日数や、体温推移から黄体期を何日間と推定したか等）も含めてください。"
}`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: "application/json"
          }
        };

        // --- 4. 利用可能なモデルの自動検索とフォールバック・リトライ実行 ---
        try {
          const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
          const modelsRes = await fetch(modelsUrl);
          const modelsData = await modelsRes.json();
          
          if (modelsData.error) {
             throw new Error(`APIキーエラー: ${modelsData.error.message}`);
          }

          const available = (modelsData.models || []).filter(m => 
            m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent') &&
            m.name.includes('gemini')
          );

          if (available.length === 0) {
             throw new Error('利用可能なGeminiモデルが見つかりません');
          }

          // 安定して優秀なモデルを優先的に選択
          const bestModel = available.find(m => m.name.includes('1.5-flash')) ||
                            available.find(m => m.name.includes('2.5-flash')) ||
                            available.find(m => m.name.includes('flash')) ||
                            available[0];
                            
          const targetModelName = bestModel.name.replace('models/', '');
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModelName}:generateContent?key=${apiKey}`;
          
          // サーバー混雑対策：エラー時に待機して最大5回再試行する（エクスポネンシャル・バックオフ）
          const retryDelays = [1000, 2000, 4000, 8000, 16000];
          let resultText = null;
          let lastError = null;

          for (let attempt = 0; attempt <= retryDelays.length; attempt++) {
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              const result = await res.json();
              
              if (result.error) {
                 throw new Error(result.error.message);
              }
              
              const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) {
                resultText = text;
                break; // 成功したらループを抜ける
              } else {
                 throw new Error('AIからデータが返却されませんでした');
              }
            } catch (err) {
              lastError = err;
              console.warn(`AIアクセス試行 ${attempt + 1}回目 失敗:`, err.message);
              // まだリトライ回数が残っていれば待機する
              if (attempt < retryDelays.length) {
                await new Promise(resolve => setTimeout(resolve, retryDelays[attempt]));
              }
            }
          }

          // リトライを全て失敗した場合
          if (!resultText) {
             throw new Error(`サーバーが混雑しています。時間をおいて再試行してください (${lastError?.message || '不明なエラー'})`);
          }

          const cleanText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
          const aiPred = JSON.parse(cleanText);
          aiPred.cycle_id = activeCycle.id;
          Store.set({ aiPrediction: aiPred });
          localStorage.setItem('iui_ai_prediction', JSON.stringify(aiPred));
          Utils.showToast('AIの分析が完了しました✨');
          
        } catch (e) {
          console.error(e);
          Utils.showToast(`エラー: ${e.message.substring(0, 45)}...`, true);
        } finally {
          document.getElementById('global-loading').classList.add('hidden');
        }
      }

    const FormTitles = { daily: '日次記録', clinic: '通院記録', iui: 'IUI予定・結果', 'new-cycle': '周期の登録・編集', meds: '薬・注射' };

    const App = {
      chartInstance: null,

      async init() {
        // 1. ローカルキャッシュからデータを読み込み、即座に画面を描画する（爆速化）
        const hasCache = API.loadFromCache();
        
        if (hasCache) {
          if(Store.get().currentView === 'home') this.render();
          document.getElementById('global-loading').classList.add('hidden');
        } else {
          document.getElementById('global-loading').classList.remove('hidden');
        }

        // 2. 裏側（バックグラウンド）で最新データを取得し、完了したら静かに再描画する
        await API.fetchAll();
        
        setTimeout(() => {
          if(Store.get().currentView === 'home') this.render();
          document.getElementById('global-loading').classList.add('hidden');
        }, 300);
      },

      render() {
        const { currentView } = Store.get();
        const content = document.getElementById('app-content');
        content.innerHTML = Views[currentView] ? Views[currentView]() : '';
        content.classList.remove('hidden');

        document.querySelectorAll('.nav-btn').forEach(btn => {
          if(btn.dataset.target === currentView) {
            btn.classList.add('text-primary'); btn.classList.remove('text-sub');
          } else {
            btn.classList.remove('text-primary'); btn.classList.add('text-sub');
          }
        });

        if (currentView === 'records') {
          setTimeout(() => this.renderChart(), 50);
        }
      },

      changeRecordsCycle(id) {
        Store.set({ selectedCycleId: id });
      },

      renderChart() {
        const canvas = document.getElementById('tempChart');
        if (!canvas) return;

        const { daily, iui, selectedCycleId, activeCycle, cycles } = Store.get();
        const targetCycleId = selectedCycleId || (activeCycle ? activeCycle.id : null);
        const targetCycle = cycles.find(c => c.id === targetCycleId);
        
        if (!targetCycle) {
          if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }
          const emptyEl = document.getElementById('tempChart-empty');
          if (emptyEl) emptyEl.classList.remove('hidden');
          return;
        }

        let startDateStr = Utils.toLocalYYYYMMDD(targetCycle.start_date);
        let endDateStr = '9999-12-31';
        
        const sortedCycles = [...cycles].sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        const targetIndex = sortedCycles.findIndex(c => c.id === targetCycleId);
        if (targetIndex !== -1 && targetIndex < sortedCycles.length - 1) {
          endDateStr = Utils.toLocalYYYYMMDD(sortedCycles[targetIndex + 1].start_date);
        }

        // 日付範囲でフィルタリング
        const cycleDaily = daily
          .filter(d => {
             const dStr = Utils.toLocalYYYYMMDD(d.date);
             return d.temperature && dStr >= startDateStr && dStr < endDateStr;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        if (cycleDaily.length === 0) {
          if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }
          const emptyEl = document.getElementById('tempChart-empty');
          if (emptyEl) emptyEl.classList.remove('hidden');
          return;
        }

        const emptyEl = document.getElementById('tempChart-empty');
        if (emptyEl) emptyEl.classList.add('hidden');

        // その周期のIUI実施(予定)日を取得 (日付範囲でフィルタリング)
        const cycleIuiDates = iui
          .filter(ev => {
             const dStr = Utils.toLocalYYYYMMDD(ev.actual_date || ev.planned_date);
             return dStr && dStr >= startDateStr && dStr < endDateStr;
          })
          .map(ev => Utils.toLocalYYYYMMDD(ev.actual_date || ev.planned_date));

        const labels = [];
        const data = [];
        const pointColors = [];
        const pointRadii = [];
        const pointStyles = [];

        cycleDaily.forEach(d => {
          const dStr = Utils.toLocalYYYYMMDD(d.date);
          labels.push(Utils.formatMMDD(new Date(d.date)));
          data.push(parseFloat(d.temperature));

          let color = '#D4A5A5';
          let radius = 4;
          let style = 'circle';

          if (cycleIuiDates.includes(dStr)) {
            color = '#F4A4A4';
            radius = 8;
            style = 'rectRot';
          }

          pointColors.push(color);
          pointRadii.push(radius);
          pointStyles.push(style);
        });

        if (this.chartInstance) {
          this.chartInstance.destroy();
        }

        const ctx = canvas.getContext('2d');
        this.chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '基礎体温',
              data: data,
              borderColor: '#D4A5A5',
              backgroundColor: 'rgba(212, 165, 165, 0.2)',
              borderWidth: 2,
              pointBackgroundColor: pointColors,
              pointBorderColor: pointColors,
              pointRadius: pointRadii,
              pointStyle: pointStyles,
              tension: 0.3,
              spanGaps: true
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
              legend: { display: false },
              tooltip: { callbacks: { label: function(context) { return context.parsed.y + ' °C'; } } }
            },
            scales: {
              y: {
                suggestedMin: 36.0,
                suggestedMax: 37.0,
                ticks: { stepSize: 0.2, font: { size: 10 } },
                grid: { color: '#F2F2F7' }
              },
              x: {
                ticks: { font: { size: 10 } },
                grid: { display: false }
              }
            }
          }
        });
      },

      navigate(view) { Store.set({ currentView: view }); window.scrollTo(0,0); },
      
      switchDashTab(tab) { Store.set({ dashTab: tab }); },

      openModal(type, id = null, defaultDate = null) {
        document.getElementById('modal-title').innerText = FormTitles[type];
        document.getElementById('modal-body').innerHTML = Forms[type](id, defaultDate);
        
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth;
        overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
        sheet.classList.remove('closed'); sheet.classList.add('open');
      },

      closeModal() {
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        sheet.classList.remove('open'); sheet.classList.add('closed');
        overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
        setTimeout(() => { overlay.classList.add('hidden'); }, 300);
      },

      getCycleForDate(dateStr) {
        const { cycles } = Store.get();
        if (!cycles.length) return null;
        const sorted = [...cycles].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
        for (const c of sorted) {
          if (dateStr >= Utils.toLocalYYYYMMDD(c.start_date)) return c;
        }
        return null;
      },

      checkExistingDaily(dateStr) {
        const r = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === dateStr);
        document.getElementById('form-id').value = r ? r.id : '';
        document.getElementById('form-temp').value = r ? (r.temperature || '') : '';
      },

      submitForm(table) {
        const id = document.getElementById('form-id')?.value;
        const payload = { id };

        if (table === 'daily') {
          payload.date = document.getElementById('form-date').value;
          payload.temperature = document.getElementById('form-temp').value;
        } else if (table === 'clinic') {
          payload.visit_date = document.getElementById('form-date').value;
          payload.next_visit_date = document.getElementById('form-next').value;
        } else if (table === 'iui') {
          payload.planned_date = document.getElementById('form-planned').value;
          payload.actual_date = document.getElementById('form-actual-check').checked ? payload.planned_date : '';
        } else if (table === 'cycles') {
          payload.start_date = document.getElementById('form-date').value;
          payload.type = document.getElementById('form-type').value;
          payload.status = document.getElementById('form-status').value;
        }

        API.save(table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles', payload);
      },

      getCycleStats() {
        const { cycles } = Store.get();
        const lengths = [];
        for (let i = 0; i < cycles.length - 1; i++) {
          const s1 = new Date(cycles[i].start_date);
          const s2 = new Date(cycles[i+1].start_date);
          const days = Math.round((s2 - s1) / 86400000);
          if (days >= 20 && days <= 50) lengths.push(days);
        }
        if (lengths.length === 0) return { avg: 31, median: 31, count: 0 };
        const avg = Math.round(lengths.reduce((a,b)=>a+b, 0) / lengths.length);
        lengths.sort((a,b)=>a-b);
        const mid = Math.floor(lengths.length / 2);
        const median = lengths.length % 2 !== 0 ? lengths[mid] : Math.round((lengths[mid - 1] + lengths[mid]) / 2);
        return { avg, median, count: lengths.length };
      },

      applyCycleStat(val) {
        document.getElementById('set-cycle-len').value = val;
        this.updateSettings('cycleLen', val);
        Utils.showToast(`${val}日に設定しました`);
      },

      getPredictions() {
        const { activeCycle, iui, settings, cycles } = Store.get();
        let preds = { 
          iui: null, abstain: null, period: null, isIUIDone: false, actual: null, isPredictedIUI: false,
          futureCycles: [] 
        };
        if (!activeCycle) return preds;

        // --- 過去の実績から平均日数を算出 ---
        let totalIuiPhase = 0;
        let countIuiPhase = 0;
        let totalLutealPhase = 0;
        let countLutealPhase = 0;

        cycles.forEach(c => {
          if (c.id === activeCycle.id) return; // 過去周期のみ
          const cIuis = iui.filter(x => x.cycle_id === c.id);
          const cIui = cIuis[cIuis.length - 1]; // その周期の最新IUI
          const nextC = cycles.find(nc => new Date(nc.start_date) > new Date(c.start_date));

          if (cIui && (cIui.actual_date || cIui.planned_date)) {
            const iuiDate = new Date(cIui.actual_date || cIui.planned_date);
            const startDate = new Date(c.start_date);
            const iuiPhase = Math.floor((iuiDate - startDate) / 86400000);
            if (iuiPhase > 0 && iuiPhase < 40) {
              totalIuiPhase += iuiPhase;
              countIuiPhase++;
            }
            if (nextC) {
              const nextStartDate = new Date(nextC.start_date);
              const lutealPhase = Math.floor((nextStartDate - iuiDate) / 86400000);
              if (lutealPhase > 0 && lutealPhase < 25) {
                totalLutealPhase += lutealPhase;
                countLutealPhase++;
              }
            }
          }
        });

        // 実績があれば平均を採用、なければ設定値からフォールバック
        const avgIuiPhase = countIuiPhase > 0 ? Math.round(totalIuiPhase / countIuiPhase) : (settings.cycleLen > 14 ? settings.cycleLen - 14 : 14);
        const avgLutealPhase = countLutealPhase > 0 ? Math.round(totalLutealPhase / countLutealPhase) : 14;
        
        // --- 今回周期の予測 ---
        const cycleIUI = iui.filter(i => i.cycle_id === activeCycle.id);
        const latestIUI = cycleIUI[cycleIUI.length - 1];
        
        const startD = activeCycle.start_date;
        
        // IUIが確定しているかどうか
        if (latestIUI && (latestIUI.planned_date || latestIUI.actual_date)) {
          preds.isIUIDone = !!latestIUI.actual_date;
          if (latestIUI.planned_date) {
            preds.iui = Utils.toLocalYYYYMMDD(latestIUI.planned_date);
            preds.abstain = Utils.toLocalYYYYMMDD(Utils.addDays(latestIUI.planned_date, -settings.abstainDays));
          }
          if (preds.isIUIDone) {
            preds.actual = Utils.toLocalYYYYMMDD(latestIUI.actual_date);
          }
          // 生理予定日は、確定したIUI日 + 平均黄体期
          const baseIuiDate = preds.actual || preds.iui;
          preds.period = Utils.toLocalYYYYMMDD(Utils.addDays(baseIuiDate, avgLutealPhase));
        } else {
          // 未確定の場合は開始日 + 平均IUIフェーズ
          const estIui = Utils.addDays(startD, avgIuiPhase);
          preds.iui = Utils.toLocalYYYYMMDD(estIui);
          preds.abstain = Utils.toLocalYYYYMMDD(Utils.addDays(estIui, -settings.abstainDays));
          preds.period = Utils.toLocalYYYYMMDD(Utils.addDays(estIui, avgLutealPhase));
          preds.isPredictedIUI = true;
        }
        
        // --- 未来の周期の予測 ---
        if (preds.period) {
          for (let i = 1; i <= 3; i++) {
            // 前の周期の生理予定日を起点とする
            const prevPeriodObj = i === 1 ? new Date(preds.period) : new Date(preds.futureCycles[i - 2].period);
            
            const fIuiObj = Utils.addDays(prevPeriodObj, avgIuiPhase);
            const fAbstainObj = fIuiObj ? Utils.addDays(fIuiObj, -settings.abstainDays) : null;
            const fPeriodObj = Utils.addDays(fIuiObj, avgLutealPhase);
            
            preds.futureCycles.push({
              period: Utils.toLocalYYYYMMDD(fPeriodObj),
              iui: Utils.toLocalYYYYMMDD(fIuiObj),
              abstain: Utils.toLocalYYYYMMDD(fAbstainObj)
            });
          }
        }
        
        return preds;
      },

      getPeriodDates() {
        const { cycles, settings } = Store.get();
        const preds = App.getPredictions();
        const periodDates = new Set();
        
        const addDates = (startStr) => {
          if (!startStr) return;
          for (let i = 0; i < settings.periodDays; i++) {
            const dateStr = Utils.toLocalYYYYMMDD(Utils.addDays(startStr, i));
            if (dateStr) periodDates.add(dateStr);
          }
        };

        cycles.forEach(c => addDates(c.start_date));
        addDates(preds.period);
        preds.futureCycles.forEach(fc => addDates(fc.period));
        
        return periodDates;
      },

      getAbstainDates() {
        const { iui, settings } = Store.get();
        const preds = App.getPredictions();
        const abstainDates = new Set();
        
        const addDates = (abstainStr, iuiStr) => {
          if (!abstainStr || !iuiStr) return;
          let currentStr = abstainStr;
          let safety = 0;
          while (currentStr < iuiStr && safety < 15) { 
            abstainDates.add(currentStr);
            currentStr = Utils.toLocalYYYYMMDD(Utils.addDays(currentStr, 1));
            safety++;
          }
        };

        iui.forEach(ev => {
          if (ev.planned_date) {
            const iuiStr = Utils.toLocalYYYYMMDD(ev.planned_date);
            const abstainStr = Utils.toLocalYYYYMMDD(Utils.addDays(ev.planned_date, -settings.abstainDays));
            addDates(abstainStr, iuiStr);
          }
        });

        addDates(preds.abstain, preds.iui);
        preds.futureCycles.forEach(fc => addDates(fc.abstain, fc.iui));
        
        return abstainDates;
      },

      goToday() {
        const now = new Date();
        Store.set({ calMonth: new Date(now.getFullYear(), now.getMonth(), 1) });
      },

      changeMonth(delta) {
        const current = Store.get().calMonth;
        const nextMonth = new Date(current.getFullYear(), current.getMonth() + delta, 1);
        Store.set({ calMonth: nextMonth });
      },

      selectDate(dStr) {
        document.querySelectorAll('[id^="cal-cell-"]').forEach(el => {
          el.classList.remove('bg-primary', 'text-white');
          const dot = el.querySelector('.bg-white');
          if(dot) dot.classList.replace('bg-white', 'bg-primary');
        });
        
        const targetEl = document.getElementById(`cal-cell-${dStr}`);
        if(targetEl) {
          targetEl.classList.add('bg-primary', 'text-white');
          const dot = targetEl.querySelector('.bg-primary');
          if(dot && targetEl.classList.contains('bg-primary')) dot.classList.replace('bg-primary', 'bg-white');
        }

        const { daily, clinic, cycles, iui, settings } = Store.get();
        const preds = App.getPredictions();
        const aiPred = Store.get().aiPrediction;
        
        const cycleStarts = cycles.map(c => Utils.toLocalYYYYMMDD(c.start_date));
        const iuiDates = iui.map(ev => Utils.toLocalYYYYMMDD(ev.planned_date)).filter(d => d);
        const abstainStartDates = iuiDates.map(dateStr => Utils.toLocalYYYYMMDD(Utils.addDays(dateStr, -settings.abstainDays)));

        const futurePeriods = preds.futureCycles.map(fc => fc.period);
        const futureIuis = preds.futureCycles.map(fc => fc.iui);
        const futureAbstains = preds.futureCycles.map(fc => fc.abstain);
        
        let eventContent = '';
        
        const makeEventRow = (title, colorClass, date) => `
          <div class="mb-2 flex justify-between items-center">
            <span class="text-[13px] font-bold ${colorClass}">${title}</span>
            <button onclick="App.openCalendarLink('${title}', '${date}')" class="text-[10px] bg-white border border-border text-sub px-2.5 py-1 rounded-lg shadow-sm active:bg-gray-50 transition-colors font-bold flex items-center gap-1"><span class="text-[10px] leading-none">＋</span>追加</button>
          </div>
        `;
        
        if (iuiDates.includes(dStr)) eventContent += makeEventRow('🌸 IUI実施日', 'text-[#B07B7B]', dStr);
        else if (dStr === preds.iui && !preds.isPredictedIUI) eventContent += makeEventRow('🌸 IUI実施予定日', 'text-[#B07B7B]', dStr);
        else if (dStr === preds.iui && preds.isPredictedIUI) eventContent += makeEventRow('🌸 IUI目安 (予測)', 'text-[#B07B7B]/70', dStr);
        else if (futureIuis.includes(dStr)) eventContent += makeEventRow('🌸 IUI目安 (予測)', 'text-[#B07B7B]/70', dStr);
        
        if (cycleStarts.includes(dStr)) eventContent += makeEventRow('🩸 生理開始日', 'text-red-400', dStr);
        else if (dStr === preds.period) eventContent += makeEventRow('🩸 次回生理予定日', 'text-red-400', dStr);
        else if (futurePeriods.includes(dStr)) eventContent += makeEventRow('🩸 生理予定日 (予測)', 'text-red-400/70', dStr);

        if (aiPred && aiPred.cycle_id === Store.get().activeCycle?.id) {
          if (dStr === aiPred.ovulation_date) eventContent += makeEventRow('🥚 排卵日 (AI推測)', 'text-indigo-500', dStr);
          if (dStr === aiPred.next_period_date) eventContent += makeEventRow('✨ 次回生理予定 (AI予測)', 'text-red-400', dStr);
        }

        const isPeriod = App.getPeriodDates().has(dStr);
        const isPeriodStart = cycleStarts.includes(dStr) || dStr === preds.period || futurePeriods.includes(dStr);
        if (isPeriod && !isPeriodStart) {
          eventContent += `<div class="mb-2 flex justify-between items-center"><span class="text-[13px] font-bold text-red-400/70">🩸 生理期間</span><div></div></div>`;
        }

        const isAbstain = App.getAbstainDates().has(dStr);
        
        if (isAbstain) {
          // 確定した予定（実績または手動入力されたIUI予定）に基づく禁欲期間かどうかを判定
          const isConfirmed = abstainStartDates.some(sd => {
             const ev = iui.find(x => Utils.toLocalYYYYMMDD(Utils.addDays(x.planned_date, -settings.abstainDays)) === sd);
             if(ev && dStr >= sd && dStr < Utils.toLocalYYYYMMDD(ev.planned_date)) return true;
             return false;
          }) || (dStr >= preds.abstain && dStr < preds.iui && !preds.isPredictedIUI);

          if (isConfirmed) {
            eventContent += makeEventRow('❌ 禁欲期間', 'text-[#8A6565]', dStr);
          } else {
            eventContent += makeEventRow('❌ 禁欲期間 (予測)', 'text-[#8A6565]/70', dStr);
          }
        }

        const dRec = daily.find(r => Utils.toLocalYYYYMMDD(r.date) === dStr);
        const cRec = clinic.find(r => Utils.toLocalYYYYMMDD(r.visit_date) === dStr);
        const iRec = iui.find(r => Utils.toLocalYYYYMMDD(r.planned_date) === dStr || Utils.toLocalYYYYMMDD(r.actual_date) === dStr);
        
        let content = '';
        if(eventContent) content += `<div class="mb-3 pb-2 border-b border-border/50">${eventContent}</div>`;
        if(dRec) content += `<div class="mb-1 text-[14px]">🌡 体温: <span class="font-bold">${dRec.temperature || '-'}</span> °C</div>`;
        if(cRec) content += `<div class="text-[14px] mb-1">🏥 受診記録あり</div>`;
        if(iRec && iRec.actual_date) content += `<div class="text-[14px]">🌸 IUI実施済み</div>`;
        
        const actionHtml = `
          <div class="grid grid-cols-3 gap-2 mt-4">
            <button class="w-full py-2.5 rounded-xl border border-primary text-primary font-bold text-[12px] bg-primary-light/10 active:bg-primary-light transition-colors" onclick="App.openModal('daily', '${dRec?dRec.id:''}', '${dStr}')">🌡 体温</button>
            <button class="w-full py-2.5 rounded-xl border border-primary text-primary font-bold text-[12px] bg-primary-light/10 active:bg-primary-light transition-colors" onclick="App.openModal('clinic', '${cRec?cRec.id:''}', '${dStr}')">🏥 通院</button>
            <button class="w-full py-2.5 rounded-xl border border-primary text-primary font-bold text-[12px] bg-primary-light/10 active:bg-primary-light transition-colors" onclick="App.openModal('iui', '${iRec?iRec.id:''}', '${dStr}')">🌸 IUI</button>
          </div>
        `;

        document.getElementById('cal-detail-area').innerHTML = `
          <div class="text-sm font-bold text-sub mb-3">${dStr.replace(/-/g, '/')}</div>
          <div class="bg-card p-4 rounded-[16px] shadow-sm border border-border/20">
            ${content ? content : `<div class="text-sub text-sm">記録なし</div>`}
            ${actionHtml}
          </div>
        `;
      },

      updateSettings(key, val) {
        const s = Store.get().settings;
        s[key] = parseInt(val, 10);
        Store.set({ settings: s });
        localStorage.setItem('iui_settings', JSON.stringify(s));
      },
      
      updateApiKey(val) {
        const key = val.trim();
        Store.set({ apiKey: key });
        localStorage.setItem('iui_gemini_api_key', key);
        Utils.showToast('APIキーを保存しました');
      },
      
      openCalendarLink(title, dateStr) {
        const url = Utils.getCalendarUrl(title, dateStr);
        window.open(url, '_blank');
      }
    };

    window.onload = () => App.init();
  </script>
</body>
</html>
