<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- PWA & iOS Home Screen Settings -->
  <title>にんサポ</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="にんサポ">
  <meta name="theme-color" content="#D4A5A5">
  
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="manifest" href="data:application/manifest+json,{&quot;name&quot;:&quot;にんサポ&quot;,&quot;short_name&quot;:&quot;にんサポ&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#FDFBFB&quot;,&quot;theme_color&quot;:&quot;#D4A5A5&quot;}">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js for Graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#D4A5A5',
            'primary-light': '#F8EFEF',
            bg: '#FDFBFB',
            card: '#FFFFFF',
            main: '#333333',
            sub: '#8E8E93',
            border: '#E5E5EA'
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Hiragino Sans"', 'sans-serif'],
            serif: ['serif']
          }
        }
      }
    }
  </script>
  
  <style>
    html, body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; background-color: #FDFBFB; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .bottom-sheet { transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
    .bottom-sheet.open { transform: translateY(0); }
    .bottom-sheet.closed { transform: translateY(100%); }
    .fade-in { animation: fadeIn 0.2s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* iOS Safe Area Paddings */
    .padding-safe-nav { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 90px); }
    .padding-safe-modal { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 40px); }
    .padding-safe-toast { top: calc(env(safe-area-inset-top, 20px) + 10px); }
    
    /* フォーム要素のはみ出し防止 */
    *, *::before, *::after { box-sizing: border-box; }
    .form-control { 
      width: 100% !important; 
      max-width: 100% !important; 
      box-sizing: border-box !important; 
      -webkit-appearance: none !important; 
      appearance: none !important; 
    }
  </style>
</head>
<body class="text-main font-sans antialiased overflow-x-hidden">

  <div id="global-loading" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center fade-in">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-primary-light border-t-primary mb-4"></div>
    <div class="text-primary font-bold text-sm tracking-widest">LOADING...</div>
  </div>

  <div id="toast" class="fixed padding-safe-toast left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-medium z-[110] transition-opacity duration-300 opacity-0 pointer-events-none shadow-lg whitespace-nowrap"></div>

  <main id="app-content" class="w-full min-h-screen px-4 pt-4 padding-safe-nav hidden fade-in"></main>

  <div id="modal-overlay" class="fixed inset-0 bg-black/30 z-40 hidden transition-opacity opacity-0" onclick="App.closeModal()"></div>
  <div id="modal-sheet" class="bottom-sheet closed fixed inset-x-0 bottom-0 z-50 bg-bg rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] max-h-[85vh] flex flex-col max-w-full overflow-x-hidden box-border">
    <div class="sticky top-0 bg-bg/95 backdrop-blur z-10 px-6 py-4 flex justify-between items-center border-b border-border/50 shrink-0">
      <h3 id="modal-title" class="text-lg font-bold">タイトル</h3>
      <button onclick="App.closeModal()" class="text-sub p-2 -mr-2 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center font-bold">✕</button>
    </div>
    <div id="modal-body" class="p-6 flex-1 overflow-y-auto no-scrollbar padding-safe-modal"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-border z-30" style="padding-bottom: env(safe-area-inset-bottom, 0px);">
    <div class="flex justify-around items-center h-[70px] px-2" id="nav-container">
      <button onclick="App.navigate('home')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="home"><span class="text-2xl mb-0.5">🏠</span>ホーム</button>
      <button onclick="App.navigate('calendar')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="calendar"><span class="text-2xl mb-0.5">📅</span>カレンダー</button>
      <button onclick="App.navigate('records')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="records"><span class="text-2xl mb-0.5">✏️</span>記録</button>
      <button onclick="App.navigate('cycles')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="cycles"><span class="text-2xl mb-0.5">🔄</span>周期</button>
      <button onclick="App.navigate('settings')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-colors" data-target="settings"><span class="text-2xl mb-0.5">⚙️</span>設定</button>
    </div>
  </nav>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxHyWLD6EKwNQUHuBfvy0M7Cf636iFou4E6ndgtb0sfc8lKfAGPvmRUoPKMRbb1A_5WxA/exec';
    
    const Utils = {
      toLocalYYYYMMDD: (dateInput) => {
        if (!dateInput) return '';
        const d = new Date(dateInput);
        if (isNaN(d)) return '';
        return new Intl.DateTimeFormat('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'Asia/Tokyo' }).format(d).replace(/\//g, '-');
      },
      getTodayStr: () => Utils.toLocalYYYYMMDD(new Date()),
      addDays: (dateStr, days) => {
        const d = new Date(dateStr);
        if (isNaN(d)) return null;
        d.setDate(d.getDate() + days);
        return d;
      },
      formatMMDD: (d) => {
        if (!d || isNaN(d)) return '-';
        return `${d.getMonth() + 1}/${d.getDate()}`;
      },
      generateId: () => 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36),
      showToast: (msg, isError = false) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = `fixed padding-safe-toast left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm font-medium z-[110] transition-opacity duration-300 shadow-lg ${isError ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'} opacity-100`;
        setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
      }
    };

    const Store = {
      state: {
        currentView: 'home',
        dashTab: 'current',
        cycles: [],
        daily: [],
        clinic: [],
        iui: [],
        activeCycle: null,
        // 月末のバグを防ぐため、常に「その月の1日」を基準日として保持する
        calMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1),
        settings: JSON.parse(localStorage.getItem('iui_settings')) || { cycleLen: 31, abstainDays: 2 }
      },
      set(updates) {
        this.state = { ...this.state, ...updates };
        App.render();
      },
      get() { return this.state; }
    };

    const API = {
      async fetchAll() {
        try {
          const fetchTable = async (t) => (await fetch(`${API_URL}?table=${t}`)).json();
          const [cycles, daily, clinic, iui] = await Promise.all([
            fetchTable('cycles'), fetchTable('daily_records'), fetchTable('clinic_visits'), fetchTable('iui_events')
          ]);
          
          cycles.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
          const activeCycle = cycles.length > 0 ? cycles[cycles.length - 1] : null;
          
          Store.set({ cycles, daily, clinic, iui, activeCycle });

          if (!localStorage.getItem('iui_settings')) {
            const stats = App.getCycleStats();
            if (stats.count > 0) {
              App.updateSettings('cycleLen', stats.avg);
            }
          }
        } catch (e) {
          Utils.showToast('データ同期に失敗しました', true);
        }
      },
      async save(table, payloadData) {
        const { cycles } = Store.get();
        if (cycles.length === 0 && table !== 'cycles') {
          Utils.showToast('先に周期を登録してください', true);
          return false;
        }

        const isUpdate = !!payloadData.id;
        const recordId = payloadData.id || Utils.generateId();
        
        let cycleId = undefined;
        if (table !== 'cycles') {
          const targetDate = payloadData.date || payloadData.visit_date || payloadData.planned_date || Utils.getTodayStr();
          const targetCycle = App.getCycleForDate(targetDate);
          if (!targetCycle) {
            Utils.showToast('対象日付以前の周期がありません。先に周期を追加してください。', true);
            return false;
          }
          cycleId = targetCycle.id;
        }

        const payload = { 
          action: isUpdate ? 'update' : 'insert',
          id: recordId,
          table: table,
          cycle_id: cycleId,
          ...payloadData
        };

        const localData = { ...payload };
        if(table === 'daily_records' && !localData.lh_result) localData.lh_result = '';
        
        const s = Store.get();
        let targetArrayKey = table === 'daily_records' ? 'daily' : table === 'clinic_visits' ? 'clinic' : table === 'iui_events' ? 'iui' : 'cycles';
        let newArray = [...s[targetArrayKey]];
        
        if (isUpdate) {
          const idx = newArray.findIndex(item => item.id === recordId);
          if(idx !== -1) newArray[idx] = localData;
        } else {
          newArray.push(localData);
        }
        
        if (table === 'cycles') {
          newArray.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        }
        
        Store.set({ [targetArrayKey]: newArray });
        if(table === 'cycles') Store.set({ activeCycle: newArray[newArray.length - 1] });
        
        App.closeModal();
        Utils.showToast('保存しました');

        try {
          fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => { if(res.status !== 'success') throw new Error(); })
            .catch(() => Utils.showToast('クラウド保存に失敗', true));
        } catch(e) {}
        
        return true;
      }
    };

    const Views = {
      home: () => {
        const { activeCycle, daily, dashTab } = Store.get();
        
        const headerHtml = `
          <div class="flex justify-between items-center mb-6 mt-4">
            <div>
              <div class="text-xs text-sub mb-1 font-medium">${Utils.toLocalYYYYMMDD(new Date()).replace(/-/g, '/')}</div>
              <h1 class="text-2xl font-serif tracking-wider text-main">にんサポ</h1>
            </div>
            <div class="text-3xl bg-primary-light w-10 h-10 rounded-full flex items-center justify-center">🌸</div>
          </div>
        `;

        if (!activeCycle) {
          return headerHtml + `
            <div class="bg-card rounded-[20px] p-6 shadow-sm border border-border/30 text-center">
              <p class="text-sub mb-4">現在アクティブな周期がありません</p>
              <button onclick="App.openModal('new-cycle')" class="bg-primary text-white w-full py-3 rounded-xl font-bold">新しい周期を登録</button>
            </div>
          `;
        }

        const cycleDaily = daily.filter(d => d.cycle_id === activeCycle.id);
        const today = Utils.getTodayStr();
        const startD = activeCycle.start_date;
        const diffDays = Math.floor((new Date(today) - new Date(startD)) / 86400000) + 1;
        
        const preds = App.getPredictions();
        
        const tabCurrentClass = dashTab === 'current' ? 'text-primary border-primary' : 'text-sub border-transparent';
        const tabNextClass = dashTab === 'next' ? 'text-primary border-primary' : 'text-sub border-transparent';

        const tabsHtml = `
          <div class="flex border-b border-border/50 mb-5">
            <button class="flex-1 pb-2 text-[13px] font-bold ${tabCurrentClass} border-b-2 transition-colors" onclick="App.switchDashTab('current')">今回周期</button>
            <button class="flex-1 pb-2 text-[13px] font-bold ${tabNextClass} border-b-2 transition-colors" onclick="App.switchDashTab('next')">次周期(予測)</button>
          </div>
        `;

        let dashGridHtml = '';
        if (dashTab === 'current') {
          if (preds.isIUIDone) {
            const passedDays = Math.floor((new Date(today) - new Date(preds.actual)) / 86400000);
            dashGridHtml = `
              <div class="grid grid-cols-2 gap-y-5 gap-x-6">
                <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">IUI実施日(済)</span><span class="text-lg font-bold">${preds.iui ? Utils.formatMMDD(new Date(preds.iui)) : '-'}</span></div>
                <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">IUI後経過</span><span class="text-lg font-bold">${passedDays}<span class="text-[12px] font-normal text-sub ml-1">日目</span></span></div>
                <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">次回生理予定</span><span class="text-lg font-bold">${preds.period ? Utils.formatMMDD(new Date(preds.period)) : '-'}</span><span class="text-[10px] text-sub mt-0.5">±3日</span></div>
              </div>
            `;
          } else {
            dashGridHtml = `
              <div class="grid grid-cols-2 gap-y-5 gap-x-6">
                <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">IUI実施日(予定)</span><span class="text-lg font-bold">${preds.iui ? Utils.formatMMDD(new Date(preds.iui)) : '-'}</span></div>
                <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">禁欲開始日</span><span class="text-lg font-bold">${preds.abstain ? Utils.formatMMDD(new Date(preds.abstain)) : '-'}</span></div>
                <div class="flex flex-col"><span class="text-[11px] text-sub mb-1">次回生理予定</span><span class="text-lg font-bold">${preds.period ? Utils.formatMMDD(new Date(preds.period)) : '-'}</span><span class="text-[10px] text-sub mt-0.5">±3日</span></div>
              </div>
            `;
          }
        } else {
          let futureHtml = '';
          preds.futureCycles.forEach((fc, idx) => {
            const opacity = idx === 0 ? 'border-primary' : idx === 1 ? 'border-primary/60' : 'border-primary/30';
            futureHtml += `
              <div class="border-l-[3px] ${opacity} pl-3 mb-4 last:mb-0">
                <div class="text-[12px] font-bold text-main mb-1.5">${idx + 1}周期先</div>
                <div class="grid grid-cols-3 gap-2">
                  <div class="flex flex-col"><span class="text-[10px] text-sub mb-0.5">生理予定</span><span class="text-[13px] font-bold">${fc.period ? Utils.formatMMDD(new Date(fc.period)) : '-'}</span></div>
                  <div class="flex flex-col"><span class="text-[10px] text-sub mb-0.5">IUI目安</span><span class="text-[13px] font-bold">${fc.iui ? Utils.formatMMDD(new Date(fc.iui)) : '-'}</span></div>
                  <div class="flex flex-col"><span class="text-[10px] text-sub mb-0.5">禁欲開始</span><span class="text-[13px] font-bold">${fc.abstain ? Utils.formatMMDD(new Date(fc.abstain)) : '-'}</span></div>
                </div>
              </div>
            `;
          });

          dashGridHtml = `
            <div class="flex flex-col">
              ${futureHtml}
            </div>
            <div class="mt-4 p-3 bg-gray-50 rounded-xl text-[10px] text-sub leading-relaxed">
              ※今周期の実績と設定から算出した参考スケジュールです。<br>IUI目安は今周期の実績日数を基に算出しています。
            </div>
          `;
        }

        const hasTodayDaily = cycleDaily.some(d => Utils.toLocalYYYYMMDD(d.date) === today && d.temperature);
        let tasks = [];
        
        if (hasTodayDaily) {
          tasks.push(`<div class="flex items-center text-[15px] py-3"><span class="mr-3 text-lg">✅</span><span class="text-sub">今日の体温記録は完了</span></div>`);
        } else {
          tasks.push(`<div class="flex items-center text-[15px] py-3 cursor-pointer active:opacity-50" onclick="App.openModal('daily')"><div class="w-2 h-2 rounded-full bg-primary mr-3"></div><span class="font-medium">基礎体温を記録しましょう <span class="text-gray-300 ml-1">›</span></span></div>`);
        }

        if (preds.iui && !preds.isIUIDone) {
          if (today === preds.iui) {
            tasks.push(`<div class="flex items-center text-[15px] py-3 cursor-pointer active:opacity-50 border-t border-border/50" onclick="App.openModal('iui')"><div class="w-2 h-2 rounded-full bg-red-400 mr-3"></div><span class="font-medium text-red-500">本日IUI予定日です。結果を記録 <span class="text-gray-300 ml-1">›</span></span></div>`);
          } else if (today < preds.iui && preds.abstain && today >= preds.abstain) {
             tasks.push(`<div class="flex items-center text-[15px] py-3 border-t border-border/50"><div class="w-2 h-2 rounded-full bg-[#8A6565] mr-3"></div><span class="font-medium text-[#8A6565]">禁欲期間中です (${Utils.formatMMDD(new Date(preds.iui))}予定)</span></div>`);
          }
        }

        return headerHtml + `
          <div class="bg-card rounded-[24px] p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-border/20 mb-6">
            <div class="flex justify-between items-center mb-3">
              <span class="px-3 py-1 bg-primary-light text-[#B07B7B] text-xs font-bold rounded-lg">${activeCycle.status}</span>
              <span class="text-sm text-sub font-medium">周期 ${diffDays}日目</span>
            </div>
            ${tabsHtml}
            ${dashGridHtml}
          </div>
          <h2 class="text-sm font-bold text-main mb-3 ml-1">サポートタスク</h2>
          <div class="bg-card rounded-[16px] px-4 shadow-sm border border-border/20 mb-6">
            ${tasks.join('')}
          </div>
          <h2 class="text-sm font-bold text-main mb-3 ml-1">クイック記録</h2>
          <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="App.openModal('daily')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">🌡</span><span class="text-[13px] font-bold">基礎体温</span></div><span class="text-gray-300">›</span>
            </button>
            <button onclick="App.openModal('clinic')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">🩺</span><span class="text-[13px] font-bold">通院記録</span></div><span class="text-gray-300">›</span>
            </button>
            <button onclick="App.openModal('meds')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">💊</span><span class="text-[13px] font-bold">薬・注射</span></div><span class="text-gray-300">›</span>
            </button>
            <button onclick="App.openModal('iui')" class="bg-card rounded-[16px] p-4 flex justify-between items-center shadow-sm border border-border/20 active:bg-gray-50 transition-colors">
              <div class="flex items-center gap-2"><span class="text-lg">♡</span><span class="text-[13px] font-bold">IUI管理</span></div><span class="text-gray-300">›</span>
            </button>
          </div>
        `;
      },

      calendar: () => {
        const { calMonth, daily, clinic } = Store.get();
        const year = calMonth.getFullYear();
        const month = calMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();
        
        const recordDates = new Set([...daily, ...clinic].map(r => Utils.toLocalYYYYMMDD(r.date || r.visit_date)));
        const todayStr = Utils.getTodayStr();
        const preds = App.getPredictions();

        const futurePeriods = preds.futureCycles.map(fc => fc.period);
        const futureIuis = preds.futureCycles.map(fc => fc.iui);
        const futureAbstains = preds.futureCycles.map(fc => fc.abstain);

        let cells = '';
        for (let i = 0; i < firstDay; i++) cells += `<div></div>`;
        for (let i = 1; i <= lastDay; i++) {
          const dStr = Utils.toLocalYYYYMMDD(new Date(year, month, i));
          const isToday = dStr === todayStr;
          const hasRec = recordDates.has(dStr);
          
          let eventsHtml = '';
          // 今周期
          if (dStr === preds.iui) eventsHtml += '<span class="text-[10px]">🌸</span>';
          if (dStr === preds.abstain) eventsHtml += '<span class="text-[10px]">🕊</span>';
          if (dStr === preds.period) eventsHtml += '<span class="text-[10px]">🩸</span>';
          
          // 次周期以降（重複しない場合のみ表示）
          if (futureIuis.includes(dStr) && dStr !== preds.iui) eventsHtml += '<span class="text-[10px] opacity-40">🌸</span>';
          if (futureAbstains.includes(dStr) && dStr !== preds.abstain) eventsHtml += '<span class="text-[10px] opacity-40">🕊</span>';
          if (futurePeriods.includes(dStr) && dStr !== preds.period) eventsHtml += '<span class="text-[10px] opacity-40">🩸</span>';

          cells += `
            <div class="aspect-square flex flex-col items-center pt-1 rounded-xl relative cursor-pointer active:bg-gray-100 transition-colors ${isToday ? 'border border-primary bg-primary-light/30' : ''}" 
                 onclick="App.selectDate('${dStr}')" id="cal-cell-${dStr}">
              <span class="text-[14px] ${isToday ? 'text-primary font-bold' : ''} leading-none mb-0.5">${i}</span>
              <div class="flex flex-wrap justify-center gap-[1px] leading-none px-0.5">${eventsHtml}</div>
              ${hasRec ? `<div class="w-1 h-1 bg-primary rounded-full absolute bottom-1"></div>` : ''}
            </div>
          `;
        }

        return `
          <div class="mt-4 mb-6"><h1 class="text-2xl font-serif tracking-wider text-main text-center">カレンダー</h1></div>
          <div class="bg-card rounded-[24px] p-5 shadow-sm border border-border/20">
            <div class="flex justify-between items-center mb-4 px-2">

    const FormTitles = { daily: '日次記録', clinic: '通院記録', iui: 'IUI予定・結果', 'new-cycle': '周期の登録・編集', meds: '薬・注射' };

    const App = {
      chartInstance: null,

      async init() {
        document.getElementById('global-loading').classList.remove('hidden');
        await API.fetchAll();
        setTimeout(() => {
          if(Store.get().currentView === 'home') this.render();
          document.getElementById('global-loading').classList.add('hidden');
        }, 300);
      },

      render() {
        const { currentView } = Store.get();
        const content = document.getElementById('app-content');
        content.innerHTML = Views[currentView] ? Views[currentView]() : '';
        content.classList.remove('hidden');

        document.querySelectorAll('.nav-btn').forEach(btn => {
          if(btn.dataset.target === currentView) {
            btn.classList.add('text-primary'); btn.classList.remove('text-sub');
          } else {
            btn.classList.remove('text-primary'); btn.classList.add('text-sub');
          }
        });

        if (currentView === 'records') {
          setTimeout(() => this.renderChart(), 50);
        }
      },

      renderChart() {
        const canvas = document.getElementById('tempChart');
        if (!canvas) return;

        const { activeCycle, daily } = Store.get();
        if (!activeCycle) return;

        const preds = App.getPredictions();

        const cycleDaily = daily
          .filter(d => d.cycle_id === activeCycle.id && d.temperature)
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        if (cycleDaily.length === 0) return;

        const labels = [];
        const data = [];
        const pointColors = [];
        const pointRadii = [];
        const pointStyles = [];

        cycleDaily.forEach(d => {
          const dStr = Utils.toLocalYYYYMMDD(d.date);
          labels.push(Utils.formatMMDD(new Date(d.date)));
          data.push(parseFloat(d.temperature));

          let color = '#D4A5A5';
          let radius = 4;
          let style = 'circle';

          if (dStr === preds.actual || dStr === preds.iui) {
            color = '#F4A4A4';
            radius = 8;
            style = 'rectRot';
          }

          pointColors.push(color);
          pointRadii.push(radius);
          pointStyles.push(style);
        });

        if (this.chartInstance) {
          this.chartInstance.destroy();
        }

        const ctx = canvas.getContext('2d');
        this.chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '基礎体温',
              data: data,
              borderColor: '#D4A5A5',
              backgroundColor: 'rgba(212, 165, 165, 0.2)',
              borderWidth: 2,
              pointBackgroundColor: pointColors,
              pointBorderColor: pointColors,
              pointRadius: pointRadii,
              pointStyle: pointStyles,
              tension: 0.3,
              spanGaps: true
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
              legend: { display: false },
              tooltip: { callbacks: { label: function(context) { return context.parsed.y + ' °C'; } } }
            },
            scales: {
              y: {
                suggestedMin: 36.0,
                suggestedMax: 37.0,
                ticks: { stepSize: 0.2, font: { size: 10 } },
                grid: { color: '#F2F2F7' }
              },
              x: {
                ticks: { font: { size: 10 } },
                grid: { display: false }
              }
            }
          }
        });
      },

      navigate(view) { Store.set({ currentView: view }); window.scrollTo(0,0); },
      
      switchDashTab(tab) { Store.set({ dashTab: tab }); },

      openModal(type, id = null) {
        document.getElementById('modal-title').innerText = FormTitles[type];
        document.getElementById('modal-body').innerHTML = Forms[type](id);
        
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth;
        overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
        sheet.classList.remove('closed'); sheet.classList.add('open');
      },

      closeModal() {
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        sheet.classList.remove('open'); sheet.classList.add('closed');
        overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
        setTimeout(() => { overlay.classList.add('hidden'); }, 300);
      },

      getCycleForDate(dateStr) {
        const { cycles } = Store.get();
        if (!cycles.length) return null;
        const sorted = [...cycles].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
        for (const c of sorted) {
          if (dateStr >= Utils.toLocalYYYYMMDD(c.start_date)) return c;
        }
        return null;
      },

      checkExistingDaily(dateStr) {
        const r = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === dateStr);
        document.getElementById('form-id').value = r ? r.id : '';
        document.getElementById('form-temp').value = r ? (r.temperature || '') : '';
      },

      submitForm(table) {
        const id = document.getElementById('form-id')?.value;
        const payload = { id };

        if (table === 'daily') {
          payload.date = document.getElementById('form-date').value;
          payload.temperature = document.getElementById('form-temp').value;
        } else if (table === 'clinic') {
          payload.visit_date = document.getElementById('form-date').value;
          payload.next_visit_date = document.getElementById('form-next').value;
        } else if (table === 'iui') {
          payload.planned_date = document.getElementById('form-planned').value;
          payload.actual_date = document.getElementById('form-actual-check').checked ? payload.planned_date : '';
        } else if (table === 'cycles') {
          payload.start_date = document.getElementById('form-date').value;
          payload.type = document.getElementById('form-type').value;
          payload.status = document.getElementById('form-status').value;
        }

        API.save(table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles', payload);
      },

      getCycleStats() {
        const { cycles } = Store.get();
        const lengths = [];
        for (let i = 0; i < cycles.length - 1; i++) {
          const s1 = new Date(cycles[i].start_date);
          const s2 = new Date(cycles[i+1].start_date);
          const days = Math.round((s2 - s1) / 86400000);
          if (days >= 20 && days <= 50) lengths.push(days);
        }
        if (lengths.length === 0) return { avg: 31, median: 31, count: 0 };
        const avg = Math.round(lengths.reduce((a,b)=>a+b, 0) / lengths.length);
        lengths.sort((a,b)=>a-b);
        const mid = Math.floor(lengths.length / 2);
        const median = lengths.length % 2 !== 0 ? lengths[mid] : Math.round((lengths[mid - 1] + lengths[mid]) / 2);
        return { avg, median, count: lengths.length };
      },

      applyCycleStat(val) {
        document.getElementById('set-cycle-len').value = val;
        this.updateSettings('cycleLen', val);
        Utils.showToast(`${val}日に設定しました`);
      },

      getPredictions() {
        const { activeCycle, iui, settings } = Store.get();
        let preds = { 
          iui: null, abstain: null, period: null, isIUIDone: false, actual: null, 
          futureCycles: [] 
        };
        if (!activeCycle) return preds;
        
        const cycleIUI = iui.filter(i => i.cycle_id === activeCycle.id);
        const latestIUI = cycleIUI[cycleIUI.length - 1];
        
        const startD = activeCycle.start_date;
        preds.period = Utils.toLocalYYYYMMDD(Utils.addDays(startD, settings.cycleLen));
        
        if (latestIUI) {
          preds.isIUIDone = !!latestIUI.actual_date;
          if (latestIUI.planned_date) {
            preds.iui = Utils.toLocalYYYYMMDD(latestIUI.planned_date);
            preds.abstain = Utils.toLocalYYYYMMDD(Utils.addDays(latestIUI.planned_date, -settings.abstainDays));
          }
          if (preds.isIUIDone) {
            preds.actual = Utils.toLocalYYYYMMDD(latestIUI.actual_date);
          }
        }
        
        if (preds.period) {
          let iuiCycleDays = 14; 
          if (preds.actual || preds.iui) {
            const targetIuiDate = new Date(preds.actual || preds.iui);
            iuiCycleDays = Math.floor((targetIuiDate - new Date(startD)) / 86400000);
          }
          
          for (let i = 1; i <= 3; i++) {
            const fPeriodObj = Utils.addDays(startD, settings.cycleLen * i);
            const fIuiObj = Utils.addDays(fPeriodObj, iuiCycleDays);
            const fAbstainObj = fIuiObj ? Utils.addDays(fIuiObj, -settings.abstainDays) : null;
            
            preds.futureCycles.push({
              period: Utils.toLocalYYYYMMDD(fPeriodObj),
              iui: Utils.toLocalYYYYMMDD(fIuiObj),
              abstain: Utils.toLocalYYYYMMDD(fAbstainObj)
            });
          }
        }
        
        return preds;
      },

      changeMonth(delta) {
        const current = Store.get().calMonth;
        const nextMonth = new Date(current.getFullYear(), current.getMonth() + delta, 1);
        Store.set({ calMonth: nextMonth });
      },

      selectDate(dStr) {
        document.querySelectorAll('[id^="cal-cell-"]').forEach(el => {
          el.classList.remove('bg-primary', 'text-white');
          const dot = el.querySelector('.bg-white');
          if(dot) dot.classList.replace('bg-white', 'bg-primary');
        });
        
        const targetEl = document.getElementById(`cal-cell-${dStr}`);
        if(targetEl) {
          targetEl.classList.add('bg-primary', 'text-white');
          const dot = targetEl.querySelector('.bg-primary');
          if(dot && targetEl.classList.contains('bg-primary')) dot.classList.replace('bg-primary', 'bg-white');
        }

        const preds = App.getPredictions();
        const futurePeriods = preds.futureCycles.map(fc => fc.period);
        const futureIuis = preds.futureCycles.map(fc => fc.iui);
        const futureAbstains = preds.futureCycles.map(fc => fc.abstain);
        
        let eventContent = '';
        
        if (dStr === preds.iui) eventContent += `<div class="mb-1 text-[13px] font-bold text-[#B07B7B]">🌸 IUI実施予定日</div>`;
        if (dStr === preds.abstain) eventContent += `<div class="mb-1 text-[13px] font-bold text-[#8A6565]">🕊 禁欲開始日</div>`;
        if (dStr === preds.period) eventContent += `<div class="mb-1 text-[13px] font-bold text-red-400">🩸 次回生理予定日</div>`;
        
        if (futureIuis.includes(dStr) && dStr !== preds.iui) eventContent += `<div class="mb-1 text-[13px] font-bold text-[#B07B7B]/70">🌸 IUI目安 (予測)</div>`;
        if (futureAbstains.includes(dStr) && dStr !== preds.abstain) eventContent += `<div class="mb-1 text-[13px] font-bold text-[#8A6565]/70">🕊 禁欲開始 (予測)</div>`;
        if (futurePeriods.includes(dStr) && dStr !== preds.period) eventContent += `<div class="mb-1 text-[13px] font-bold text-red-400/70">🩸 生理予定日 (予測)</div>`;

        const { daily, clinic } = Store.get();
        const dRec = daily.find(r => Utils.toLocalYYYYMMDD(r.date) === dStr);
        const cRec = clinic.find(r => Utils.toLocalYYYYMMDD(r.visit_date) === dStr);
        
        let content = '';
        if(eventContent) content += `<div class="mb-3 pb-2 border-b border-border/50">${eventContent}</div>`;
        if(dRec) content += `<div class="mb-1 text-[14px]">🌡 体温: <span class="font-bold">${dRec.temperature || '-'}</span> °C</div>`;
        if(cRec) content += `<div class="text-[14px]">🏥 受診記録あり</div>`;
        
        const actionHtml = `<button class="w-full mt-4 py-3 rounded-xl border border-primary text-primary font-bold text-sm" onclick="App.openModal('daily', '${dRec?dRec.id:''}')">日次記録を入力・編集</button>`;

        document.getElementById('cal-detail-area').innerHTML = `
          <div class="text-sm font-bold text-sub mb-3">${dStr.replace(/-/g, '/')}</div>
          ${content ? `<div class="bg-card p-4 rounded-[16px] shadow-sm border border-border/20">${content}${actionHtml}</div>` : `<div class="text-sub text-sm">記録なし${actionHtml}</div>`}
        `;
        
        setTimeout(() => {
          const dateInput = document.getElementById('form-date');
          if(dateInput && !document.getElementById('modal-sheet').classList.contains('open')) dateInput.value = dStr;
        }, 10);
      },

      updateSettings(key, val) {
        const s = Store.get().settings;
        s[key] = parseInt(val, 10);
        Store.set({ settings: s });
        localStorage.setItem('iui_settings', JSON.stringify(s));
      }
    };

    window.onload = () => App.init();
  </script>
</body>
</html>
