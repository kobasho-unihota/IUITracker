  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import {
      GoogleAuthProvider,
      getAuth,
      onAuthStateChanged,
      signInWithPopup,
      signOut,
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import {
      collection,
      deleteDoc,
      doc,
      getDoc,
      getFirestore,
      onSnapshot,
      setDoc,
      updateDoc,
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDdRlINBq1fdFbfKKkl5dQQM6rlWAKM9vo",
      authDomain: "seed-note-kobasho.firebaseapp.com",
      projectId: "seed-note-kobasho",
      storageBucket: "seed-note-kobasho.firebasestorage.app",
      messagingSenderId: "1042714808944",
      appId: "1:1042714808944:web:f5253c9b257bdac09a1ab5",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const tableKeys = {
      cycles: "cycles",
      daily_records: "daily",
      clinic_visits: "clinic",
      iui_events: "iui",
      ai_predictions: "aiPredictions",
    };
    const defaultSettings = { cycleLen: 31, abstainDays: 2, periodDays: 5, baseTemp: 36.70 };

    const getActiveCycle = (cycles) => {
      const sorted = [...cycles].sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
      return sorted[sorted.length - 1] || null;
    };

    const syncState = {
      user: null,
      status: "signed-out",
      unsubscribers: [],
      snapshots: {},
      loadedTables: new Set(),
      settingsLoaded: false,
      syncGeneration: 0,
      errors: new Set(),
    };

    const notify = () => {
      window.dispatchEvent(new CustomEvent("firebase-sync-change", {
        detail: {
          user: syncState.user,
          status: syncState.status,
        },
      }));
    };

    const tableRef = (uid, table) => collection(db, "users", uid, "iuiTracker", table, "records");
    const settingsRef = (uid) => doc(db, "users", uid, "iuiTrackerMeta", "settings");
    const ensureOnline = () => {
      if (typeof navigator !== "undefined" && navigator.onLine === false) {
        throw new Error("OFFLINE");
      }
    };
    const withWriteTimeout = (promise, timeoutMs = 15000) => new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error("WRITE_TIMEOUT")), timeoutMs);
      Promise.resolve(promise).then(
        (value) => {
          clearTimeout(timer);
          resolve(value);
        },
        (error) => {
          clearTimeout(timer);
          reject(error);
        },
      );
    });
    const updateSyncReadyState = () => {
      if (
        syncState.settingsLoaded
        && syncState.loadedTables.size === Object.keys(tableKeys).length
        && syncState.errors.size === 0
      ) {
        syncState.status = "synced";
        notify();
      }
    };

    const upsertLocalRows = (key, rows) => {
      const store = window.Store;
      if (!store) return;
      const sortedRows = key === "cycles"
        ? [...rows].sort((a, b) => new Date(a.start_date) - new Date(b.start_date))
        : rows;

      const updates = { [key]: sortedRows };
      if (key === "cycles") {
        updates.activeCycle = getActiveCycle(sortedRows);
      }

      store.set(updates);

      if (key === "aiPredictions") {
        const activeCycle = store.get().activeCycle;
        const currentAi = activeCycle
          ? sortedRows.filter((item) => item.cycle_id === activeCycle.id).pop()
          : null;
        store.set({ aiPrediction: currentAi || null });
      }
    };

    const startSync = async (user) => {
      const generation = ++syncState.syncGeneration;
      syncState.status = "syncing";
      notify();

      syncState.unsubscribers.forEach((unsubscribe) => unsubscribe());
      syncState.unsubscribers = [];
      syncState.snapshots = {};
      syncState.loadedTables = new Set();
      syncState.settingsLoaded = false;
      syncState.errors = new Set();

      const existingSettings = await getDoc(settingsRef(user.uid));
      if (generation !== syncState.syncGeneration || syncState.user?.uid !== user.uid) return;
      if (!existingSettings.exists()) {
        await setDoc(settingsRef(user.uid), {
          appSettings: defaultSettings,
          apiKey: "",
          aiMemos: {},
        });
        if (generation !== syncState.syncGeneration || syncState.user?.uid !== user.uid) return;
      }

      const unsubscribeSettings = onSnapshot(
        settingsRef(user.uid),
        (snapshot) => {
          if (generation !== syncState.syncGeneration || syncState.user?.uid !== user.uid) return;
          const data = snapshot.data() || {};
          const store = window.Store;
          if (!store) return;
          store.set({
            settings: { ...defaultSettings, ...(data.appSettings || {}) },
            apiKey: data.apiKey || "",
            aiMemos: data.aiMemos || {},
          });
          syncState.settingsLoaded = true;
          updateSyncReadyState();
        },
        (error) => {
          if (generation !== syncState.syncGeneration || syncState.user?.uid !== user.uid) return;
          console.error("Firestore settings sync error:", error);
          syncState.errors.add("settings");
          syncState.status = "error";
          notify();
        },
      );
      syncState.unsubscribers.push(unsubscribeSettings);

      Object.entries(tableKeys).forEach(([table, key]) => {
        const unsubscribe = onSnapshot(
          tableRef(user.uid, table),
          (snapshot) => {
            if (generation !== syncState.syncGeneration || syncState.user?.uid !== user.uid) return;
            syncState.snapshots[key] = snapshot.docs.map((item) => ({ ...item.data(), id: item.id }));
            syncState.loadedTables.add(key);
            upsertLocalRows(key, syncState.snapshots[key]);
            updateSyncReadyState();
          },
          (error) => {
            if (generation !== syncState.syncGeneration || syncState.user?.uid !== user.uid) return;
            console.error("Firestore sync error:", error);
            syncState.errors.add(key);
            syncState.status = "error";
            notify();
          },
        );
        syncState.unsubscribers.push(unsubscribe);
      });
    };

    window.FirebaseSync = {
      get user() {
        return syncState.user;
      },
      get status() {
        return syncState.status;
      },
      async signIn() {
        syncState.status = "syncing";
        notify();
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          syncState.status = syncState.user ? "synced" : "signed-out";
          notify();
          throw error;
        }
      },
      async signOut() {
        await signOut(auth);
      },
      async retry() {
        if (!syncState.user) throw new Error("Not signed in.");
        await startSync(syncState.user);
      },
      async save(table, record) {
        if (!syncState.user) throw new Error("Not signed in.");
        if (!record?.id) throw new Error("Missing record id.");
        ensureOnline();
        await withWriteTimeout(setDoc(doc(tableRef(syncState.user.uid, table), record.id), record));
      },
      async delete(table, id) {
        if (!syncState.user) throw new Error("Not signed in.");
        if (!id) throw new Error("Missing record id.");
        ensureOnline();
        await withWriteTimeout(deleteDoc(doc(tableRef(syncState.user.uid, table), id)));
      },
      async saveSetting(key, value) {
        if (!syncState.user) throw new Error("Not signed in.");
        ensureOnline();
        await withWriteTimeout(updateDoc(settingsRef(syncState.user.uid), { [`appSettings.${key}`]: value }));
      },
      async saveApiKey(value) {
        if (!syncState.user) throw new Error("Not signed in.");
        ensureOnline();
        await withWriteTimeout(updateDoc(settingsRef(syncState.user.uid), { apiKey: value }));
      },
      async saveAiMemo(cycleId, value) {
        if (!syncState.user) throw new Error("Not signed in.");
        ensureOnline();
        await withWriteTimeout(updateDoc(settingsRef(syncState.user.uid), { [`aiMemos.${cycleId}`]: value }));
      },
    };

    onAuthStateChanged(auth, async (user) => {
      syncState.user = user;

      if (!user) {
        syncState.syncGeneration++;
        syncState.unsubscribers.forEach((unsubscribe) => unsubscribe());
        syncState.unsubscribers = [];
        syncState.status = "signed-out";
        notify();
        return;
      }

      try {
        await startSync(user);
      } catch (error) {
        console.error("Firebase initialization error:", error);
        syncState.status = "error";
        notify();
      }
    });
  </script>

      <button onclick="App.navigate('cycles')" class="nav-btn flex-1 flex flex-col items-center justify-center gap-1 text-[10px] text-sub transition-all duration-200" data-target="cycles" aria-label="周期"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7h-5V2M4 17h5v5m10-8a7 7 0 0 1-12 4l-3-3m1-5A7 7 0 0 1 17 6l3 3"/></svg>周期</button>

    </div>
  </nav>

  <script>
    const defaultSettings = { cycleLen: 31, abstainDays: 2, periodDays: 5, baseTemp: 36.70 };

    const Utils = {
      toLocalYYYYMMDD: (dateInput) => {
        if (!dateInput) return '';
        if (typeof dateInput === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateInput)) return dateInput;
        const d = new Date(dateInput);
        if (isNaN(d)) return '';
        return new Intl.DateTimeFormat('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'Asia/Tokyo' }).format(d).replace(/\//g, '-');
      },
      getTodayStr: () => Utils.toLocalYYYYMMDD(new Date()),
      addDays: (dateStr, days) => {
        const ymd = Utils.toLocalYYYYMMDD(dateStr);
        const d = new Date(`${ymd}T00:00:00+09:00`);
        if (isNaN(d)) return null;
        return new Date(d.getTime() + Number(days) * 86400000);
      },
      formatMMDD: (dateInput) => {
        const ymd = Utils.toLocalYYYYMMDD(dateInput);
        if (!ymd) return '-';
        const [, month, day] = ymd.split('-');
        return `${Number(month)}/${Number(day)}`;
      },
      generateId: () => 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36),
      escapeHtml: (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char])),
      showToast: (msg, isError = false) => {
        const t = document.getElementById('toast');
        clearTimeout(Utils.toastTimer);
        t.innerText = msg;
        t.className = `fixed padding-safe-toast left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl text-sm font-medium z-[110] transition-opacity duration-300 shadow-lg max-w-[calc(100vw-32px)] text-center ${isError ? 'bg-red-500 text-white' : 'bg-gray-800 text-white'} opacity-100`;
        Utils.toastTimer = setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
      },
      getCalendarUrl: (title, dateStr) => {
        const start = Utils.toLocalYYYYMMDD(dateStr);
        const end = Utils.addDays(dateStr, 1);
        const format = (d) => Utils.toLocalYYYYMMDD(d).replace(/-/g, '');
        const dates = `${format(start)}/${format(end)}`;
        return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dates}`;
      }
    };

    const Store = {
      state: {
        currentView: 'home',
        dashTab: 'current',
        cycles: [],
        daily: [],
        clinic: [],
        iui: [],
        aiPredictions: [],
        aiPrediction: null,
        apiKey: '',
        aiMemos: {},
        syncStatus: 'signed-out',
        syncUserEmail: '',
        activeCycle: null,
        selectedCycleId: null,
        calMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1),
        settings: defaultSettings
      },
      set(updates) {
        this.state = { ...this.state, ...updates };
        App.render();
      },
      get() { return this.state; }
    };
    window.Store = Store;

    window.addEventListener('firebase-sync-change', (event) => {
      const detail = event.detail || {};
      const updates = {
        syncStatus: detail.status || 'signed-out',
        syncUserEmail: detail.user?.email || '',
      };

      if (!detail.user) {
        Object.assign(updates, {
          cycles: [],
          daily: [],
          clinic: [],
          iui: [],
          aiPredictions: [],
          aiPrediction: null,
          apiKey: '',
          aiMemos: {},
          activeCycle: null,
          selectedCycleId: null,
          settings: defaultSettings,
        });
      }

      Store.set(updates);
    });

    const getFormTitle = (type) => {
      if (type === 'iui') {
        const activeCycle = Store.get().activeCycle;
        const isTiming = activeCycle && (activeCycle.type === 'タイミング周期' || activeCycle.type === '自然周期');
        return isTiming ? 'タイミング予定・結果' : 'IUI予定・結果';
      }
      const titles = { daily: '日次記録', clinic: '通院記録', 'new-cycle': '周期の登録・編集', meds: '薬・注射' };
      return titles[type] || '記録';
    };

    const API = {
      analysisController: null,

      cancelAnalysis() {
        if (!this.analysisController) return;
        this.analysisController.userCancelled = true;
        this.analysisController.abort();
      },

      async save(table, payloadData) {
        if (!window.FirebaseSync?.user) {
          Utils.showToast('Googleログイン後に保存できます', true);
          App.navigate('settings');
          return false;
        }

        const { cycles } = Store.get();
        if (cycles.length === 0 && table !== 'cycles') {
          Utils.showToast('先に周期を登録してください', true);
          return false;
        }

        const incomingId = typeof payloadData.id === 'string' ? payloadData.id.trim() : payloadData.id;
        const existingDaily = table === 'daily_records' && !incomingId
          ? Store.get().daily.find(record => Utils.toLocalYYYYMMDD(record.date) === payloadData.date)
          : null;
        const recordId = incomingId
          || existingDaily?.id
          || (table === 'daily_records' && payloadData.date ? `daily-${payloadData.date}` : Utils.generateId());
        
        let cycleId = undefined;
        if (table !== 'cycles') {
          const targetDate = payloadData.date || payloadData.visit_date || payloadData.planned_date || Utils.getTodayStr();
          const targetCycle = App.getCycleForDate(targetDate);
          if (!targetCycle) {
            if (table !== 'ai_predictions') {
               Utils.showToast('対象日付以前の周期がありません。先に周期を追加してください。', true);
               return false;
            }
          } else {
             cycleId = targetCycle.id;
          }
          if (table === 'ai_predictions' && payloadData.cycle_id) {
             cycleId = payloadData.cycle_id;
          }
        }

        const payload = {
          ...payloadData,
          id: recordId,
        };
        if (cycleId) {
          payload.cycle_id = cycleId;
        } else if (!payload.cycle_id) {
          delete payload.cycle_id;
        }

        const localData = Object.fromEntries(
          Object.entries(payload).filter(([, value]) => value !== undefined)
        );
        if(table === 'daily_records' && !localData.lh_result) localData.lh_result = '';
        const formId = document.getElementById('form-id');
        if (formId && !formId.value) formId.value = recordId;
        
        try {
          await window.FirebaseSync?.save(table, localData);
          if (table !== 'ai_predictions') App.closeModal(true);
          if (table !== 'ai_predictions') {
             Utils.showToast('保存しました');
          }
        } catch(e) {
          console.warn('Firestore save error:', e);
          if (table !== 'ai_predictions') {
            const message = e.message === 'OFFLINE'
              ? 'オフラインです。接続を確認して再試行してください'
              : e.message === 'WRITE_TIMEOUT'
                ? '保存確認に時間がかかっています。接続後に再試行してください'
                : '保存できませんでした';
            Utils.showToast(message, true);
          }
          return false;
        }
        
        return true;
      },
      
      async analyzeWithAI(cycleId) {
        const { daily, cycles, iui, apiKey, aiPredictions, activeCycle } = Store.get();
        
        if (!apiKey) {
          Utils.showToast('設定画面からGemini APIキーを登録してください', true);
          setTimeout(() => App.navigate('settings'), 1500);
          return;
        }
        
        const targetCycleId = cycleId || (activeCycle ? activeCycle.id : null);
        if (!targetCycleId) return Utils.showToast('対象の周期がありません', true);
        const targetCycle = cycles.find(c => c.id === targetCycleId);
        if (!targetCycle) return;
        
        const targetStartDateStr = Utils.toLocalYYYYMMDD(targetCycle.start_date);
        
        let targetEndDateStr = '9999-12-31';
        const sortedCycles = [...cycles].sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        const targetIndex = sortedCycles.findIndex(c => c.id === targetCycleId);
        if (targetIndex !== -1 && targetIndex < sortedCycles.length - 1) {
          targetEndDateStr = Utils.toLocalYYYYMMDD(sortedCycles[targetIndex + 1].start_date);
        }
        
        const cycleDaily = daily
          .filter(d => {
             const dStr = Utils.toLocalYYYYMMDD(d.date);
             return d.temperature && dStr >= targetStartDateStr && dStr < targetEndDateStr;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date));
          
        if (cycleDaily.length < 5) return Utils.showToast('予測にはもう少し体温データが必要です（5日分以上）', true);

        const loading = document.getElementById('global-loading');
        const loadingText = document.getElementById('global-loading-text');
        const cancelButton = document.getElementById('global-loading-cancel');
        if (this.analysisController) return;
        const analysisController = new AbortController();
        this.analysisController = analysisController;
        const analysisTimeout = setTimeout(() => analysisController.abort(), 30000);
        const waitForRetry = (delay) => new Promise((resolve, reject) => {
          const onAbort = () => {
            clearTimeout(timer);
            reject(new DOMException('Aborted', 'AbortError'));
          };
          const timer = setTimeout(() => {
            analysisController.signal.removeEventListener('abort', onAbort);
            resolve();
          }, delay);
          analysisController.signal.addEventListener('abort', onAbort, { once: true });
        });
        loadingText.innerText = 'AIがデータを分析しています';
        cancelButton.classList.remove('hidden');
        loading.classList.remove('hidden');
        
        const dataText = cycleDaily.map(d => {
            let txt = `${Utils.toLocalYYYYMMDD(d.date)}: ${d.temperature}度`;
            if (d.memo) txt += ` (メモ: ${d.memo})`;
            return txt;
        }).join('\n');
        
        let userMemo = '';
        const aiMemoInput = document.getElementById('ai-memo-input');
        const aiMemoInputRecord = document.getElementById('ai-memo-input-record');
        if (aiMemoInput && aiMemoInput.value.trim() !== '') {
           userMemo = aiMemoInput.value.trim();
        } else if (aiMemoInputRecord && aiMemoInputRecord.value.trim() !== '') {
           userMemo = aiMemoInputRecord.value.trim();
        } else {
           userMemo = Store.get().aiMemos[targetCycleId] || '';
        }

        let userMemoText = "";
        if (userMemo) {
            userMemoText = `\n【ユーザーからの補足メモ（この周期に関する特記事項）】\n${userMemo}\n`;
        }

        const targetEventLabel = (targetCycle.type === 'タイミング周期' || targetCycle.type === '自然周期') ? 'タイミング' : 'IUI';

        let pastDataText = "";
        const pastCycles = sortedCycles.slice(0, targetIndex === -1 ? sortedCycles.length : targetIndex).slice(-3);
        
        if (pastCycles.length > 0) {
          pastDataText += "【過去の周期の実績（参考データ）】\n";
          pastCycles.forEach((c, index) => {
            const nextC = cycles.find(nc => new Date(nc.start_date) > new Date(c.start_date));
            if (nextC) {
              const startDate = new Date(c.start_date);
              const nextStartDate = new Date(nextC.start_date);
              const cycleLength = Math.round((nextStartDate - startDate) / 86400000);
              
              pastDataText += `[過去周期 ${index + 1}]\n`;
              pastDataText += `- 周期開始日(生理日): ${Utils.toLocalYYYYMMDD(startDate)}\n`;
              pastDataText += `- 周期日数: ${cycleLength}日 (次生理日: ${Utils.toLocalYYYYMMDD(nextStartDate)})\n`;
              
              const cIui = iui.filter(x => {
                 const evDate = Utils.toLocalYYYYMMDD(x.actual_date || x.planned_date);
                 return evDate >= Utils.toLocalYYYYMMDD(startDate) && evDate < Utils.toLocalYYYYMMDD(nextStartDate);
              }).pop();
              
              if (cIui && (cIui.actual_date || cIui.planned_date)) {
                 const iuiDate = new Date(cIui.actual_date || cIui.planned_date);
                 const pastEventLabel = (c.type === 'タイミング周期' || c.type === '自然周期') ? 'タイミング' : 'IUI';
                 pastDataText += `- ${pastEventLabel}実施(予定)日: ${Utils.toLocalYYYYMMDD(iuiDate)}\n`;
              }
              
              const pDaily = daily
                .filter(d => {
                   const dStr = Utils.toLocalYYYYMMDD(d.date);
                   return d.temperature && dStr >= Utils.toLocalYYYYMMDD(startDate) && dStr < Utils.toLocalYYYYMMDD(nextStartDate);
                })
                .sort((a, b) => new Date(a.date) - new Date(b.date));
              
              if (pDaily.length > 0) {
                 const pDataText = pDaily.map(d => `${Utils.formatMMDD(new Date(d.date))}:${d.temperature}`).join(', ');
                 pastDataText += `- 基礎体温データ: ${pDataText}\n`;
              }
              pastDataText += "\n";
            }
          });
          if (pastDataText === "【過去の周期の実績（参考データ）】\n") {
             pastDataText = "※過去の周期完了データ（次の生理が来た記録）はまだありません。\n";
          }
        } else {
          pastDataText = "※過去の周期完了データはまだありません。\n";
        }

        const currentIUI = iui.filter(x => {
           const evDate = Utils.toLocalYYYYMMDD(x.actual_date || x.planned_date);
           return evDate >= targetStartDateStr && evDate < targetEndDateStr;
        }).pop();
        let currentIUIText = "";
        if(currentIUI && (currentIUI.actual_date || currentIUI.planned_date)) {
          currentIUIText = `\n【今周期の${targetEventLabel}実施(予定)日】\n${Utils.toLocalYYYYMMDD(currentIUI.actual_date || currentIUI.planned_date)}\n`;
        }

        const prompt = `あなたは不妊治療をサポートするAIアシスタントです。以下の今周期のデータ（基礎体温、メモ内容、${targetEventLabel}実施日）と、過去の周期の実績を総合的に分析し、以下の2点を予測してください。

1. 今周期の「低温相から高温相へ移行したタイミング（推測・排卵日）」
2. 「推測・排卵日 または ${targetEventLabel}実施日 から推測される次回の生理予定日」
※生理予定日の予測には、一般的な14日固定ではなく、必ず【過去の周期の実績】から平均や傾向を算出し、それを最優先で加算してください。過去データがない場合のみ14日として計算してください。
${userMemoText ? '※補足メモがある場合は、その内容も推測の材料や理由コメントへの反映に活用してください。' : ''}

【今周期のデータ】
${dataText}
${currentIUIText}
${userMemoText}

${pastDataText}

結果は必ず以下のキーを持つJSON形式で返してください。Markdownの装飾などは含めず、純粋なJSON文字列のみを出力してください。
{
  "ovulation_date": "YYYY-MM-DD",
  "next_period_date": "YYYY-MM-DD",
  "reason": "推測の理由やアドバイス（2〜3文）。医師のような専門的かつ丁寧で落ち着いた口調で記述してください。次回の生理予定日の算出根拠も含めてください。"
}`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: "application/json"
          }
        };

        try {
          const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
          const modelsRes = await fetch(modelsUrl, { signal: analysisController.signal });
          const modelsData = await modelsRes.json();
          
          if (modelsData.error) {
             throw new Error(`APIキーエラー: ${modelsData.error.message}`);
          }

          const available = (modelsData.models || []).filter(m => 
            m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent') &&
            m.name.includes('gemini')
          );

          if (available.length === 0) {
             throw new Error('利用可能なGeminiモデルが見つかりません');
          }

          const bestModel = available.find(m => m.name.includes('1.5-flash')) ||
                            available.find(m => m.name.includes('2.5-flash')) ||
                            available.find(m => m.name.includes('flash')) ||
                            available[0];
                            
          const targetModelName = bestModel.name.replace('models/', '');
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModelName}:generateContent?key=${apiKey}`;
          
          const retryDelays = [1000, 2000, 4000];
          let resultText = null;
          let lastError = null;

          for (let attempt = 0; attempt <= retryDelays.length; attempt++) {
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: analysisController.signal,
              });
              const result = await res.json();
              
              if (result.error) {
                 throw new Error(result.error.message);
              }
              
              const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) {
                resultText = text;
                break; 
              } else {
                 throw new Error('AIからデータが返却されませんでした');
              }
            } catch (err) {
              if (analysisController.signal.aborted) throw err;
              lastError = err;
              console.warn(`AIアクセス試行 ${attempt + 1}回目 失敗:`, err.message);
              if (attempt < retryDelays.length) {
                await waitForRetry(retryDelays[attempt]);
              }
            }
          }

          if (!resultText) {
             throw new Error(`サーバーが混雑しています。時間をおいて再試行してください (${lastError?.message || '不明なエラー'})`);
          }

          const cleanText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
          const aiPred = JSON.parse(cleanText);
          aiPred.cycle_id = targetCycleId;
          
          let newAiPredictions = [...Store.get().aiPredictions];
          const existingIdx = newAiPredictions.findIndex(p => p.cycle_id === targetCycleId);
          const predId = existingIdx !== -1 ? newAiPredictions[existingIdx].id : `ai-${targetCycleId}`;
          
          const savePayload = {
              id: predId,
              cycle_id: targetCycleId,
              ovulation_date: aiPred.ovulation_date || '',
              next_period_date: aiPred.next_period_date || '',
              reason: aiPred.reason || ''
          };
          
          const saved = await API.save('ai_predictions', savePayload);
          if (!saved) throw new Error('AI分析結果をFirestoreへ保存できませんでした');
          
          if (activeCycle && targetCycleId === activeCycle.id) {
              Store.set({ aiPrediction: aiPred });
          }
          Utils.showToast('AIの分析が完了しました✨');
          
        } catch (e) {
          console.error(e);
          if (analysisController.signal.aborted) {
            Utils.showToast(analysisController.userCancelled ? 'AI分析をキャンセルしました' : 'AI分析がタイムアウトしました', true);
          } else {
            Utils.showToast(`エラー: ${e.message.substring(0, 45)}...`, true);
          }
        } finally {
          clearTimeout(analysisTimeout);
          if (this.analysisController === analysisController) this.analysisController = null;
          cancelButton.classList.add('hidden');
          loadingText.innerText = '読み込んでいます';
          loading.classList.add('hidden');
        }
      }
    };

    const Views = {
      authRequired: () => `
        <div class="min-h-[70vh] flex items-center justify-center">
          <div class="w-full max-w-md card-soft rounded-[32px] p-7 text-center">
            <div class="mx-auto mb-5 w-16 h-16 rounded-[24px] bg-primary text-white flex items-center justify-center text-3xl shadow-lg shadow-slate-300/60">📈</div>
            <p class="text-xs text-sub font-bold tracking-[0.24em] mb-3">SECURE CLOUD</p>
            <h1 class="text-3xl font-serif tracking-wider text-main mb-3">Rhythm</h1>
            <p class="text-sm text-sub leading-relaxed mb-6">周期・体温・通院記録をFirebaseで安全に同期します。スマホでも同じGoogleアカウントで続きから見られます。</p>
            <button onclick="App.signInToSync()" class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-sm active:scale-[0.98] transition-transform">Googleでログイン</button>
            <p class="text-[11px] text-sub leading-relaxed mt-4">データの保存先はFirestoreだけ。端末を替えても同じ記録を確認できます。</p>
          </div>
        </div>
      `,

      syncing: () => `
        <div class="min-h-[70vh] flex items-center justify-center">
          <div class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-primary-light border-t-primary mx-auto mb-4"></div>
            <p class="text-sm font-bold text-main">Firebaseから読み込んでいます</p>
            <p class="text-xs text-sub mt-2">少しだけお待ちください</p>
          </div>
        </div>
      `,

      syncError: () => `
        <div class="min-h-[70vh] flex items-center justify-center">
          <div class="w-full max-w-md card-soft rounded-[30px] p-7 text-center">
            <div class="mx-auto mb-5 w-14 h-14 rounded-2xl bg-rose-50 text-rose-500 flex items-center justify-center text-2xl">!</div>
            <p class="text-[10px] font-bold tracking-[0.18em] text-rose-500 mb-2">SYNC ERROR</p>
            <h1 class="text-xl font-bold text-main mb-3">データを完全に読み込めませんでした</h1>
            <p class="text-sm text-sub leading-relaxed mb-6">不完全な状態で重複登録しないよう、記録の編集を一時停止しています。通信状態を確認して再試行してください。</p>
            <button onclick="App.retrySync()" class="btn-primary w-full py-4 rounded-2xl font-bold">同期を再試行</button>
            <button onclick="App.signOutFromSync()" class="w-full mt-3 py-3 rounded-2xl border border-border bg-white text-sm font-bold text-main">別のアカウントでログイン</button>
          </div>
        </div>
      `,

      home: () => {
        const { activeCycle, daily, dashTab, aiPredictions, aiMemos, syncStatus } = Store.get();

        } else if (cycleDailyForAI.length >= 5) {
          aiHtml = `
            <details class="group bg-gradient-to-br from-slate-100 to-blue-50 rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-blue-100 mb-6">
              <summary class="flex justify-between items-center p-5 cursor-pointer list-none [&::-webkit-details-marker]:hidden outline-none select-none">
                <h2 class="text-sm font-bold text-slate-800 flex items-center gap-2"><span class="text-lg">✨</span> AIデータ分析</h2>
                <svg class="w-5 h-5 text-slate-400 group-open:rotate-180 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </summary>
              <div class="px-5 pb-5 border-t border-blue-100/50 pt-4 mt-1">
                <p class="text-[13px] text-slate-800 font-bold mb-4 text-center">基礎体温データから排卵日と<br>次の生理予定日を分析します</p>
                <div class="mb-4">
                  <label for="ai-memo-input" class="block text-[11px] font-bold mb-1 text-slate-600">AIへの補足メモ（任意）</label>
                  <textarea id="ai-memo-input" class="form-control w-full bg-white border border-blue-100 rounded-xl px-3 py-2 text-[13px] outline-none focus:border-blue-300" rows="2" placeholder="例: 排卵検査薬が陽性になった、薬を飲んでいる等" onchange="App.updateAiMemo('${activeCycle.id}', this.value)">${Utils.escapeHtml(savedAiMemo)}</textarea>
                </div>
                <button onclick="API.analyzeWithAI('${activeCycle.id}')" class="bg-blue-500 text-white w-full py-3.5 rounded-xl font-bold text-sm shadow-sm active:scale-[0.98] transition-transform">AIで予測する</button>
              </div>
            </details>
          `;
        }

        const hasTodayDaily = cycleDaily.some(d => Utils.toLocalYYYYMMDD(d.date) === today && d.temperature);
        let tasks = [];
        
        if (hasTodayDaily) {
          tasks.push(`<div class="flex items-center text-[15px] py-3"><span class="mr-3 text-lg text-teal-500">☑</span><span class="text-sub">今日の体温記録は完了</span></div>`);
        } else {
          tasks.push(`<button type="button" class="w-full flex items-center text-left text-[15px] py-3 active:opacity-50" onclick="App.openModal('daily')"><span class="w-2 h-2 rounded-full bg-primary mr-3"></span><span class="font-medium text-main">基礎体温を記録しましょう <span class="text-gray-300 ml-1">›</span></span></button>`);
        }

        if (preds.iui && !preds.isIUIDone && !preds.isPredictedIUI && !isRestCycle) {
          if (today === preds.iui) {
            tasks.push(`<button type="button" class="w-full flex items-center text-left text-[15px] py-3 active:opacity-50 border-t border-border/50" onclick="App.openModal('iui')"><span class="w-2 h-2 rounded-full ${mainBgClass} mr-3"></span><span class="font-medium ${mainTextClass}">本日${eventLabel}予定日です。結果を記録 <span class="text-gray-300 ml-1">›</span></span></button>`);
          } else if (today < preds.iui && preds.abstain && today >= preds.abstain) {
             tasks.push(`<div class="flex items-center text-[15px] py-3 border-t border-border/50"><div class="w-2 h-2 rounded-full ${preBgClass} mr-3"></div><span class="font-medium ${preTextClass}">${preLabel}です (${Utils.formatMMDD(new Date(preds.iui))}予定)</span></div>`);
          }
        }

        return headerHtml + `
          <div class="hero-card rounded-[32px] p-6 mb-5 relative overflow-hidden">

              <div>

                  <span>${activeCycle.status}</span><span class="text-white/40">•</span><span>${activeCycle.type || '未設定'}</span>

                <h2 class="text-3xl font-serif tracking-wider leading-tight">周期 ${diffDays}日目</h2>
                <p class="text-white/70 text-sm mt-2">次の判断に必要な予定だけ、静かに追いかけます。</p>
              </div>
              <button onclick="App.openModal('new-cycle', '${activeCycle.id}')" class="shrink-0 bg-white/10 border border-white/20 text-white text-[12px] font-bold px-3 py-2 rounded-full active:scale-[0.98] transition-transform">編集</button>
            </div>
            <div class="relative grid grid-cols-3 gap-2 mt-6">
              <div class="bg-white/10 rounded-2xl p-3 border border-white/10">
                <div class="text-[10px] text-white/60 mb-1">${eventLabel}</div>
                <div class="font-bold text-[15px]">${preds.iui ? Utils.formatMMDD(new Date(preds.iui)) : '-'}</div>
              </div>
              <div class="bg-white/10 rounded-2xl p-3 border border-white/10">
                <div class="text-[10px] text-white/60 mb-1">次回生理</div>
                <div class="font-bold text-[15px]">${preds.period ? Utils.formatMMDD(new Date(preds.period)) : '-'}</div>
              </div>
              <div class="bg-white/10 rounded-2xl p-3 border border-white/10">
                <div class="text-[10px] text-white/60 mb-1">体温記録</div>
                <div class="font-bold text-[15px]">${cycleDaily.length}<span class="text-[11px] font-normal text-white/60 ml-0.5">件</span></div>
              </div>
            </div>
          </div>

          <div class="card-soft rounded-[28px] p-5 mb-6">
            <div class="flex justify-between items-center mb-4">
              <div>
                <p class="text-[10px] text-sub font-bold tracking-[0.18em] mb-1">FORECAST</p>
                <h2 class="text-lg font-bold text-main">今回周期の見通し</h2>
              </div>
              <button onclick="App.openModal('new-cycle', '${activeCycle.id}')" class="text-[11px] font-bold text-sub bg-slate-100 px-3 py-1.5 rounded-full">周期編集</button>
            </div>
            ${tabsHtml}
            ${dashGridHtml}
          </div>
          ${aiHtml}
          <h2 class="text-sm font-bold text-main mb-3 ml-1">今日のサポート</h2>
          <div class="card-soft rounded-[20px] px-4 mb-6">
            ${tasks.join('')}
          </div>
          <h2 class="text-sm font-bold text-main mb-3 ml-1">クイック記録</h2>
          <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="App.openModal('daily')" class="card-soft col-span-2 rounded-[22px] p-4 flex items-center gap-4 text-left active:scale-[0.99] transition-transform">
              <div class="w-12 h-12 shrink-0 rounded-2xl bg-rose-50 text-rose-500 flex items-center justify-center text-xl">🌡</div>
              <div class="flex-1">
                <div class="text-[14px] font-bold text-main">今日の基礎体温</div>
                <div class="text-[11px] text-sub mt-1">${hasTodayDaily ? '記録済み・タップして編集' : '数秒で記録できます'}</div>
              </div>
              <span class="text-slate-300 text-xl">›</span>
            </button>
            <button onclick="App.openModal('clinic')" class="card-soft rounded-[22px] p-4 text-left active:scale-[0.98] transition-transform">
              <div class="w-10 h-10 rounded-2xl bg-sky-50 text-sky-500 flex items-center justify-center text-xl mb-3">🏥</div>
              <div class="text-[13px] font-bold text-main">通院記録</div>
              <div class="text-[11px] text-sub mt-1">診察・次回予定</div>
            </button>
            <button onclick="App.openModal('iui')" class="card-soft rounded-[22px] p-4 text-left active:scale-[0.98] transition-transform">
              <div class="w-10 h-10 rounded-2xl ${isTiming ? 'bg-pink-50 text-pink-500' : 'bg-blue-50 text-blue-500'} flex items-center justify-center text-xl mb-3">${mainIcon}</div>
              <div class="text-[13px] font-bold text-main">${eventLabel}管理</div>
              <div class="text-[11px] text-sub mt-1">予定・結果</div>
            </button>
          </div>
        `;
      },

      calendar: () => {
        const { calMonth, daily, clinic, cycles, iui, settings, aiPredictions } = Store.get();
        const year = calMonth.getFullYear();
        const month = calMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const lastDay = new Date(year, month + 1, 0).getDate();
        
        const recordDates = new Set([...daily, ...clinic].map(r => Utils.toLocalYYYYMMDD(r.date || r.visit_date)));
        const todayStr = Utils.getTodayStr();
        const preds = App.getPredictions();
        const periodDates = App.getPeriodDates();
        const abstainDates = App.getAbstainDates();

        const cycleStarts = cycles.map(c => Utils.toLocalYYYYMMDD(c.start_date));
        const iuiDates = iui.map(ev => Utils.toLocalYYYYMMDD(ev.planned_date)).filter(d => d);

        const futurePeriods = preds.futureCycles.map(fc => fc.period);
        const futureIuis = preds.futureCycles.map(fc => fc.iui);
        
        const aiOvulationDates = aiPredictions.map(p => Utils.toLocalYYYYMMDD(p.ovulation_date)).filter(d => d);

        let cells = '';
        for (let i = 0; i < firstDay; i++) cells += `<div></div>`;
        for (let i = 1; i <= lastDay; i++) {
          const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
          const isToday = dStr === todayStr;
          const hasRec = recordDates.has(dStr);
          const isPeriod = periodDates.has(dStr);
          const isAbstain = abstainDates.has(dStr);
          
          const evType = App.getCycleTypeForDate(dStr);
          const isTimingEv = evType === 'タイミング周期' || evType === '自然周期';
          const mainIcon = isTimingEv ? '💕' : '📌';
          const preIcon = isTimingEv ? '💓' : '❌';
          
          let eventsHtml = '';
          const eventNames = [];
          if (iuiDates.includes(dStr)) {
            eventsHtml += `<span class="text-[10px]">${mainIcon}</span>`;
            eventNames.push(`${isTimingEv ? 'タイミング' : 'IUI'}実施日`);
          } else if (dStr === preds.iui && !preds.isPredictedIUI) {
            eventsHtml += `<span class="text-[10px]">${mainIcon}</span>`;
            eventNames.push(`${isTimingEv ? 'タイミング' : 'IUI'}予定日`);
          } else if (dStr === preds.iui && preds.isPredictedIUI) {
            eventsHtml += `<span class="text-[10px] opacity-40">${mainIcon}</span>`;
            eventNames.push(`${isTimingEv ? 'タイミング' : 'IUI'}予測日`);
          } else if (futureIuis.includes(dStr)) {
            eventsHtml += `<span class="text-[10px] opacity-40">${mainIcon}</span>`;
            eventNames.push(`${isTimingEv ? 'タイミング' : 'IUI'}予測日`);
          }
          
          if (cycleStarts.includes(dStr)) {
            eventsHtml += '<span class="text-[10px]">🩸</span>';
            eventNames.push('生理開始日');
          } else if (dStr === preds.period) {
            eventsHtml += `<span class="text-[10px]">${preds.isAIPeriod ? '✨' : '🩸'}</span>`;
            eventNames.push(preds.isAIPeriod ? 'AIによる次回生理予測日' : '次回生理予定日');
          } else if (futurePeriods.includes(dStr)) {
            eventsHtml += '<span class="text-[10px] opacity-40">🩸</span>';
            eventNames.push('生理予測日');
          }
          
          if (aiOvulationDates.includes(dStr)) {
             eventsHtml += '<span class="text-[10px]">🥚</span>';
             eventNames.push('AIによる排卵予測日');
          }

          if (isAbstain) {
            eventsHtml += `<span class="text-[10px]">${preIcon}</span>`;
            eventNames.push(isTimingEv ? 'タイミング推奨期間' : '禁欲期間');
          }

          const isIUI = iuiDates.includes(dStr) || (dStr === preds.iui && !preds.isPredictedIUI);

          let bgClass = '';
          if (isIUI) {
            bgClass = isTimingEv ? 'bg-pink-50' : 'bg-blue-50';
          } else if (isPeriod) {
            bgClass = 'bg-rose-50';
          } else if (isToday) {
            bgClass = 'bg-slate-200/50';
          }
          const borderClass = isToday ? 'border border-primary' : '';
          const textClass = isToday ? 'text-primary font-bold' : '';

          const accessibleEvents = eventNames.length ? eventNames.join('、') : '予定なし';
          cells += `

    const App = {
      chartInstance: null,
      isSubmitting: false,
      modalDirty: false,
      confirmCloseArmed: false,
      modalTrigger: null,

      async init() {
        this.render();
        document.getElementById('global-loading').classList.add('hidden');
        document.addEventListener('keydown', (event) => {
          const modal = document.getElementById('modal-sheet');
          if (!modal.classList.contains('open')) return;
          if (event.key === 'Escape') {
            this.closeModal();
            return;
          }
          if (event.key !== 'Tab') return;
          const focusable = [...modal.querySelectorAll('button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), summary, [tabindex]:not([tabindex="-1"])')]
            .filter(element => !element.hasAttribute('hidden') && element.offsetParent !== null);
          if (!focusable.length) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        });
      },

      render() {
        const { currentView, syncStatus } = Store.get();
        const content = document.getElementById('app-content');
        const nav = document.querySelector('nav');
        const isAuthGate = syncStatus === 'signed-out' || syncStatus === 'syncing' || syncStatus === 'error';

        if (syncStatus === 'error') {
          content.innerHTML = Views.syncError();
        } else if (syncStatus === 'signed-out' && currentView !== 'settings') {
          content.innerHTML = Views.authRequired();
        } else if (syncStatus === 'syncing' && currentView !== 'settings') {
          content.innerHTML = Views.syncing();
        } else {
          content.innerHTML = Views[currentView] ? Views[currentView]() : '';
        }
        content.classList.remove('hidden');
        nav.classList.toggle('hidden', isAuthGate);

        document.querySelectorAll('.nav-btn').forEach(btn => {
          if(btn.dataset.target === currentView) {
            btn.classList.add('text-primary'); btn.classList.remove('text-sub');
            btn.setAttribute('aria-current', 'page');
          } else {
            btn.classList.remove('text-primary'); btn.classList.add('text-sub');
            btn.removeAttribute('aria-current');
          }
        });

        if (currentView === 'records') {
          setTimeout(() => this.renderChart(), 50);
        }
      },

      changeRecordsCycle(id) {
        Store.set({ selectedCycleId: id });
      },

      renderChart() {
        const canvas = document.getElementById('tempChart');
        if (!canvas) return;

        const { daily, iui, selectedCycleId, activeCycle, cycles, aiPredictions } = Store.get();
        const targetCycleId = selectedCycleId || (activeCycle ? activeCycle.id : null);
        const targetCycle = cycles.find(c => c.id === targetCycleId);
        const baseTemp = Number(Store.get().settings.baseTemp || 36.70);
        
        if (!targetCycle) {
          if (this.chartInstance) { this.chartInstance.destroy(); this.chartInstance = null; }
          const emptyEl = document.getElementById('tempChart-empty');
          if (emptyEl) emptyEl.classList.remove('hidden');
          return;
        }

        const isTiming = targetCycle.type === 'タイミング周期' || targetCycle.type === '自然周期';

        const aiPrediction = aiPredictions.find(p => p.cycle_id === targetCycleId);

        let startDateStr = Utils.toLocalYYYYMMDD(targetCycle.start_date);
        let endDateStr = '9999-12-31';
        
        const sortedCycles = [...cycles].sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
        const targetIndex = sortedCycles.findIndex(c => c.id === targetCycleId);
        
        if (targetIndex !== -1 && targetIndex < sortedCycles.length - 1) {
          endDateStr = Utils.toLocalYYYYMMDD(sortedCycles[targetIndex + 1].start_date);
        } else {
          if (aiPrediction && aiPrediction.next_period_date) {
            endDateStr = Utils.toLocalYYYYMMDD(aiPrediction.next_period_date);
          } else {
            const preds = App.getPredictions();
            endDateStr = preds.period ? preds.period : Utils.toLocalYYYYMMDD(Utils.addDays(startDateStr, Store.get().settings.cycleLen));
          }
        }

        const cycleDaily = daily
          .filter(d => {
             const dStr = Utils.toLocalYYYYMMDD(d.date);
             return d.temperature && dStr >= startDateStr && dStr < endDateStr;
          })
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        const emptyEl = document.getElementById('tempChart-empty');
        if (cycleDaily.length === 0) {
          if (emptyEl) emptyEl.classList.remove('hidden');
        } else {
          if (emptyEl) emptyEl.classList.add('hidden');
        }
        
        let actualEndDateStr = endDateStr;
        if (cycleDaily.length > 0) {
            const lastDataDateStr = Utils.toLocalYYYYMMDD(cycleDaily[cycleDaily.length - 1].date);
            if (actualEndDateStr <= lastDataDateStr) {
                actualEndDateStr = Utils.toLocalYYYYMMDD(Utils.addDays(lastDataDateStr, 1));
            }
        }

        const cycleIuiDates = iui
          .filter(ev => {
             const dStr = Utils.toLocalYYYYMMDD(ev.actual_date || ev.planned_date);
             return dStr && dStr >= startDateStr && dStr < actualEndDateStr;
          })
          .map(ev => Utils.toLocalYYYYMMDD(ev.actual_date || ev.planned_date));

        let ovulationDateStr = null;
        if (aiPrediction && aiPrediction.ovulation_date) {
            ovulationDateStr = Utils.toLocalYYYYMMDD(aiPrediction.ovulation_date);
        }

        const labels = [];
        const data = [];
        const pointColors = [];
        const pointRadii = [];
        const pointStyles = [];

        let curDStr = startDateStr;
        let limit = 0;
        
        while (curDStr < actualEndDateStr && limit < 60) {
          labels.push(Utils.formatMMDD(new Date(curDStr)));
          
          const dRec = cycleDaily.find(d => Utils.toLocalYYYYMMDD(d.date) === curDStr);
          data.push(dRec ? parseFloat(dRec.temperature) : null); 

          let color = '#334155'; // primary (slate-700)
          let radius = dRec ? 4 : 0;
          let style = 'circle';

          if (cycleIuiDates.includes(curDStr)) {
            color = isTiming ? '#ec4899' : '#3b82f6'; // pink-500 or blue-500
            radius = dRec ? 8 : 0;
            style = 'rectRot';
          } else if (curDStr === ovulationDateStr) {
            color = '#14b8a6'; // teal-500
            radius = dRec ? 8 : 0;
            style = 'triangle';
          }

          pointColors.push(color);
          pointRadii.push(radius);
          pointStyles.push(style);

          curDStr = Utils.toLocalYYYYMMDD(Utils.addDays(curDStr, 1));
          limit++;
        }

        if (this.chartInstance) {
          this.chartInstance.destroy();
        }

        const ctx = canvas.getContext('2d');

        // 基準線と背景色を塗るカスタムプラグイン
        const horizontalLinePlugin = {
          id: 'horizontalLine',
          beforeDraw: chart => {
            const yValue = baseTemp;
            const yAxis = chart.scales.y;
            const yPos = yAxis.getPixelForValue(yValue);
            
            if (yPos >= yAxis.top && yPos <= yAxis.bottom) {
                const ctx = chart.ctx;
                ctx.save();

                // 高温期エリアの背景をほんのり赤色に
                ctx.fillStyle = 'rgba(254, 226, 226, 0.4)'; // rose-100の透明
                ctx.fillRect(chart.chartArea.left, yAxis.top, chart.chartArea.right - chart.chartArea.left, yPos - yAxis.top);

                // 低温期エリアの背景をほんのり青色に
                ctx.fillStyle = 'rgba(241, 245, 249, 0.4)'; // slate-100の透明
                ctx.fillRect(chart.chartArea.left, yPos, chart.chartArea.right - chart.chartArea.left, yAxis.bottom - yPos);

                // 基準線（破線）を描画
                ctx.beginPath();
                ctx.moveTo(chart.chartArea.left, yPos);
                ctx.lineTo(chart.chartArea.right, yPos);
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = 'rgba(244, 63, 94, 0.5)'; // rose-500
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                
                ctx.restore();
            }
          }
        };

        this.chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '基礎体温',
              data: data,
              borderColor: '#334155',
              backgroundColor: 'rgba(51, 65, 85, 0.2)',
              borderWidth: 2,
              pointBackgroundColor: pointColors,
              pointBorderColor: pointColors,
              pointRadius: pointRadii,
              pointStyle: pointStyles,
              tension: 0.3,
              spanGaps: true
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
              legend: { display: false },
              tooltip: { callbacks: { label: function(context) { return context.parsed.y ? context.parsed.y.toFixed(2) + ' °C' : ''; } } }
            },
            scales: {
              y: {
                suggestedMin: 36.0,
                suggestedMax: 37.2,
                ticks: { 
                  stepSize: 0.2, 
                  font: { size: 10 },
                  callback: function(value) { return value.toFixed(2); }
                },
                grid: { color: '#f1f5f9' }
              },
              x: {
                ticks: { 
                  font: { size: 9 },
                  maxRotation: 45
                },
                grid: { display: false }
              }
            }
          },
          plugins: [horizontalLinePlugin]
        });
      },

      navigate(view) { Store.set({ currentView: view }); window.scrollTo(0,0); },
      
      switchDashTab(tab) { Store.set({ dashTab: tab }); },

      openModal(type, id = null, defaultDate = null) {
        this.isSubmitting = false;
        this.modalDirty = false;
        this.confirmCloseArmed = false;
        this.modalTrigger = document.activeElement;
        if (type === 'daily' && !id) {
          const targetDate = defaultDate || Utils.getTodayStr();
          const existing = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === targetDate);
          if (existing) id = existing.id;
        }
        document.getElementById('modal-title').innerText = getFormTitle(type);
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = Forms[type](id, defaultDate);
        modalBody.oninput = () => { this.modalDirty = true; };
        modalBody.onchange = () => { this.modalDirty = true; };
        
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth;
        overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
        sheet.classList.remove('closed'); sheet.classList.add('open');
        sheet.removeAttribute('inert');
        sheet.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        setTimeout(() => {
          const firstField = document.querySelector('#modal-body input:not([type="hidden"]), #modal-body select, #modal-body textarea');
          firstField?.focus({ preventScroll: true });
        }, 220);
      },

      closeModal(force = false) {
        if (this.isSubmitting && !force) return;
        if (this.modalDirty && !force) {
          if (!this.confirmCloseArmed) {
            this.confirmCloseArmed = true;
            Utils.showToast('入力内容があります。もう一度閉じると破棄します', true);
            setTimeout(() => { this.confirmCloseArmed = false; }, 3000);
            return;
          }
        }
        const overlay = document.getElementById('modal-overlay');
        const sheet = document.getElementById('modal-sheet');
        if (this.modalTrigger && typeof this.modalTrigger.focus === 'function') {
          this.modalTrigger.focus({ preventScroll: true });
        }
        sheet.classList.remove('open'); sheet.classList.add('closed');
        sheet.setAttribute('aria-hidden', 'true');
        sheet.setAttribute('inert', '');
        overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
        document.body.style.overflow = '';
        this.modalDirty = false;
        this.confirmCloseArmed = false;
        setTimeout(() => {
          overlay.classList.add('hidden');
          this.modalTrigger = null;
        }, 300);
      },

      getCycleForDate(dateStr) {
        const { cycles } = Store.get();
        if (!cycles.length) return null;
        const sorted = [...cycles].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
        for (const c of sorted) {
          if (dateStr >= Utils.toLocalYYYYMMDD(c.start_date)) return c;
        }
        return null;
      },
      
      getCycleTypeForDate(dateStr) {
        const { cycles } = Store.get();
        if (!cycles || cycles.length === 0) return null;
        const sorted = [...cycles].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
        for (const c of sorted) {
          if (dateStr >= Utils.toLocalYYYYMMDD(c.start_date)) return c.type;
        }
        return null;
      },

      checkExistingDaily(dateStr) {
        const r = Store.get().daily.find(x => Utils.toLocalYYYYMMDD(x.date) === dateStr);
        const idField = document.getElementById('form-id');
        const tempField = document.getElementById('form-temp');
        const originalId = document.getElementById('form-original-id')?.value || '';
        idField.value = r ? r.id : originalId;
        if (r) {
          tempField.value = r.temperature || '';
        } else if (!originalId) {
          tempField.value = '';
        }
        const note = document.getElementById('form-existing-note');
        const submit = document.getElementById('form-submit');
        note?.classList.toggle('hidden', !r && !originalId);
        if (submit) {
          const label = r || originalId ? '変更を保存' : '記録を保存';
          submit.dataset.defaultLabel = label;
          submit.innerText = label;
        }
      },

      setFormError(message = '') {
        const error = document.getElementById('form-error');
        if (!error) return;
        error.innerText = message;
        error.classList.toggle('hidden', !message);
        if (message) error.scrollIntoView({ behavior: 'smooth', block: 'center' });
      },

      setSubmitState(isSaving) {
        const button = document.getElementById('form-submit');
        this.isSubmitting = isSaving;
        if (!button) return;
        button.disabled = isSaving;
        button.setAttribute('aria-busy', isSaving ? 'true' : 'false');
        button.innerText = isSaving ? '保存しています…' : (button.dataset.defaultLabel || '保存する');
      },

      validateForm(table, payload) {
        if (table === 'daily') {
          if (!payload.date) return '日付を選択してください。';
          if (payload.date > Utils.getTodayStr()) return '基礎体温は今日以前の日付で記録してください。';
          if (payload.temperature === '') return '基礎体温を入力してください。';
          const temperature = Number(payload.temperature);
          if (!Number.isFinite(temperature) || temperature < 34 || temperature > 42) {
            return '基礎体温は34.00〜42.00°Cの範囲で入力してください。';
          }
        }
        if (table === 'clinic') {
          if (!payload.visit_date) return '受診日を選択してください。';
          if (payload.visit_date > Utils.getTodayStr()) return '受診日は今日以前の日付を選択してください。';
          if (payload.next_visit_date && payload.next_visit_date < payload.visit_date) {
            return '次回受診日は受診日以降の日付を選択してください。';
          }
        }
        if (table === 'iui' && !payload.planned_date) return '予定日を選択してください。';
        if (table === 'cycles') {
          if (!payload.start_date) return '生理開始日を選択してください。';
          if (payload.start_date > Utils.getTodayStr()) return '生理開始日は今日以前の日付を選択してください。';
          const duplicate = Store.get().cycles.some(cycle =>
            cycle.id !== payload.id && Utils.toLocalYYYYMMDD(cycle.start_date) === payload.start_date
          );
          if (duplicate) return '同じ開始日の周期がすでに登録されています。';
          const currentCycle = Store.get().cycles.find(cycle => cycle.id === payload.id);
          if (currentCycle && Utils.toLocalYYYYMMDD(currentCycle.start_date) !== payload.start_date) {
            const state = Store.get();
            const linkedCount = [...state.daily, ...state.clinic, ...state.iui, ...state.aiPredictions]
              .filter(item => item.cycle_id === payload.id).length;
            if (linkedCount > 0) return `関連する記録が${linkedCount}件あるため、開始日は変更できません。`;
          }
        }
        return '';
      },

      async submitForm(table) {
        if (this.isSubmitting) return;
        const id = document.getElementById('form-id')?.value;
        const payload = { id };

        if (table === 'daily') {
          payload.date = document.getElementById('form-date').value;
          payload.temperature = document.getElementById('form-temp').value;
        } else if (table === 'clinic') {
          payload.visit_date = document.getElementById('form-date').value;
          payload.next_visit_date = document.getElementById('form-next').value;
        } else if (table === 'iui') {
          payload.planned_date = document.getElementById('form-planned').value;
          payload.actual_date = document.getElementById('form-actual-check').checked ? payload.planned_date : '';
        } else if (table === 'cycles') {
          payload.start_date = document.getElementById('form-date').value;
          payload.type = document.getElementById('form-type').value;
          payload.status = document.getElementById('form-status').value;
        }

        const validationError = this.validateForm(table, payload);
        if (validationError) {
          this.setFormError(validationError);
          return;
        }
        if (table === 'daily') payload.temperature = Number(payload.temperature).toFixed(2);

        this.setFormError('');
        this.setSubmitState(true);
        const dbTable = table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles';
        const saved = await API.save(dbTable, payload);
        if (!saved) this.setSubmitState(false);
      },

      async deleteRecord(table, id, btnEl) {
        if (table === 'cycles') {
          const state = Store.get();
          const linkedCount = [...state.daily, ...state.clinic, ...state.iui, ...state.aiPredictions]
            .filter(item => item.cycle_id === id).length;
          if (linkedCount > 0) {
            Utils.showToast(`関連する記録が${linkedCount}件あるため、この周期は削除できません`, true);
            return;
          }
        }
        if (!btnEl.dataset.confirm) {
           btnEl.dataset.confirm = "true";
           btnEl.classList.add('bg-rose-500', 'text-white');
           btnEl.classList.remove('bg-rose-50', 'text-rose-500', 'border-rose-200');
           btnEl.innerText = '本当に削除しますか？';
           setTimeout(() => {
              if (btnEl) {
                 btnEl.dataset.confirm = "";
                 btnEl.classList.remove('bg-rose-500', 'text-white');
                 btnEl.classList.add('bg-rose-50', 'text-rose-500', 'border-rose-200');
                 btnEl.innerText = 'この記録を削除';
              }
           }, 3000);
           return;
        }
        
        const dbTable = table === 'daily' ? 'daily_records' : table === 'clinic' ? 'clinic_visits' : table === 'iui' ? 'iui_events' : 'cycles';

        try {
          await window.FirebaseSync?.delete(dbTable, id);
          App.closeModal(true);
          Utils.showToast('削除しました');
        } catch(e) {
          console.warn('Firestore delete error:', e);
          Utils.showToast('削除できませんでした', true);
        }
      },

      getCycleStats() {
        const { cycles } = Store.get();
        const lengths = [];
        for (let i = 0; i < cycles.length - 1; i++) {
          const s1 = new Date(cycles[i].start_date);
          const s2 = new Date(cycles[i+1].start_date);
          const days = Math.round((s2 - s1) / 86400000);
          if (days >= 20 && days <= 50) lengths.push(days);
        }
        if (lengths.length === 0) return { avg: 31, median: 31, count: 0 };
        const avg = Math.round(lengths.reduce((a,b)=>a+b, 0) / lengths.length);
        lengths.sort((a,b)=>a-b);
        const mid = Math.floor(lengths.length / 2);
        const median = lengths.length % 2 !== 0 ? lengths[mid] : Math.round((lengths[mid - 1] + lengths[mid]) / 2);
        return { avg, median, count: lengths.length };
      },

      getBaseTempStat() {
        const { daily } = Store.get();
        const temps = daily.filter(d => d.temperature).map(d => parseFloat(d.temperature));
        if (temps.length === 0) return 36.70;
        const avg = temps.reduce((a, b) => a + b, 0) / temps.length;
        return Math.round(avg * 100) / 100;
      },
